<script src="sai-reader-api-client.js"></script>

<body>

  <header class="masthead">
    <div class="masthead-inner">
      <div>
        <div class="brand">SAI <span class="accent">Reader</span><span class="stop">.</span></div>
        <div class="tagline">Editorial triage · Science Accountability Institute</div>
      </div>
      <div class="masthead-meta">
        <span class="last-fetch" id="last-fetch">Loading feeds…</span>
        <button id="refresh-btn">↻ Refresh feeds</button>
      </div>
    </div>
  </header>

  <nav class="tabs">
    <div class="tabs-inner">
      <div class="tab-list" id="tab-list">
        <button class="tab active" data-tab="scientists">Scientists <span class="count"
            id="count-scientists">·</span></button>
        <button class="tab" data-tab="writers">Science Writers <span class="count" id="count-writers">·</span></button>
        <button class="tab" data-tab="all">All <span class="count" id="count-all">·</span></button>
        <button class="tab" data-tab="picks">★ Picks <span class="count" id="count-picks">·</span></button>
        <button class="tab" data-tab="frontpage">Front Page</button>
        <button class="tab" data-tab="settings">Settings</button>
      </div>
      <div class="filter-bar" id="filter-bar">
        <label>Tags</label>
        <div class="filter-tags" id="filter-tags"></div>
        <label for="search-input">Search</label>
        <input type="text" id="search-input" placeholder="title, author, tag…">
        <label><input type="checkbox" id="show-archived"> Show archived</label>
      </div>
    </div>
  </nav>

  <main>
    <div id="view-feed">
      <div id="feed-status" class="feed-status">Loading feeds…</div>
      <div id="feed-errors" class="feed-error-list hidden"></div>
      <div id="cloud-panel-mount"></div>
      <div id="item-grid" class="item-grid"></div>
    </div>
    <div id="view-picks" class="hidden"></div>
    <div id="view-frontpage" class="hidden"></div>
    <div id="view-settings" class="hidden"></div>
  </main>

  <script>
    /* ============================================================
       FEEDS — these are the seed defaults. Once you add or remove
       feeds in Settings, your edits are stored in localStorage and
       override the defaults from then on. To restore the defaults,
       use the "Reset to default feed list" button in Settings.
       ============================================================ */
    const SCIENTIST_FEEDS_DEFAULTS = [
      { name: "The Skeptical Scientist", author: "Bob Morris, MD, PhD", url: "https://drbobmorris.substack.com/feed" },
      { name: "Rasmussen Retorts", author: "Angela Rasmussen, PhD", url: "https://rasmussenretorts.substack.com/feed" },
      { name: "Plagues, Pollution & Poverty", author: "Bruce Lanphear, MD", url: "https://blanphear.substack.com/feed" },
      { name: "Science-Based Medicine", author: "Jonathan Howard et al.", url: "https://sciencebasedmedicine.org/feed/" },
      { name: "Making Science Make Sense", author: "Jessica Malaty Rivera, MS", url: "https://makingsciencemakesense.substack.com/feed" }
    ];

    const WRITER_FEEDS_DEFAULTS = [
      { name: "Important Context", author: "Walker Bragman", url: "https://www.importantcontext.news/feed" },
      { name: "Counter Disinformation Project", author: "Counter Disinformation Project", url: "https://counterdisinformationproject.substack.com/feed" },
      { name: "Pandemic Accountability Index", author: "JJ Kogburne", url: "https://www.panaccindex.info/feed" }
    ];

    const FEEDS_STORAGE_KEY = "sai-reader-feeds-v1";

    // Mutable arrays — populated from localStorage if present, else defaults
    let SCIENTIST_FEEDS = [];
    let WRITER_FEEDS = [];

    function loadFeeds() {
      try {
        const raw = JSON.parse(localStorage.getItem(FEEDS_STORAGE_KEY));
        if (raw && Array.isArray(raw.scientists) && Array.isArray(raw.writers)) {
          SCIENTIST_FEEDS = raw.scientists.slice();
          WRITER_FEEDS = raw.writers.slice();
          return;
        }
      } catch (e) { /* fall through */ }
      SCIENTIST_FEEDS = SCIENTIST_FEEDS_DEFAULTS.slice();
      WRITER_FEEDS = WRITER_FEEDS_DEFAULTS.slice();
    }

    function saveFeeds() {
      localStorage.setItem(FEEDS_STORAGE_KEY, JSON.stringify({
        scientists: SCIENTIST_FEEDS,
        writers: WRITER_FEEDS
      }));
    }

    function resetFeedsToDefaults() {
      localStorage.removeItem(FEEDS_STORAGE_KEY);
      loadFeeds();
    }

    loadFeeds();

    /* ============================================================
       CONFIG
       ============================================================ */
    // Proxy cascade. We try each in order until one succeeds.
    // Each entry has a build(url) that returns the proxied URL,
    // and a "name" used in error reporting.
    const PROXIES = [
      { name: "corsproxy.io", build: u => "https://corsproxy.io/?" + encodeURIComponent(u) },
      { name: "allorigins.win", build: u => "https://api.allorigins.win/raw?url=" + encodeURIComponent(u) }
    ];
    // Back-compat: some places (Settings UI) read PROXY_URL for display.
    const PROXY_URL = PROXIES[0].name + " (with fallbacks)";
    const TIME_WINDOW_DAYS = 14;
    const STORAGE_KEY = "sai-reader-v2";
    const STORAGE_KEY_OLD = "sai-reader-v1";   // for one-time migration
    const FEED_CACHE_KEY = "sai-reader-feed-cache-v1";
    const FEED_CACHE_TTL_MS = 30 * 60 * 1000; // 30 min

    /* ============================================================
       STATE
       ============================================================ */
    let allItems = [];          // all parsed items, both groups
    let triage = loadTriage();  // { [url]: { tags: [], starred, archived } }
    let activeTab = "scientists";
    let activeTagFilters = [];  // array of tag strings; AND semantics
    let searchQuery = "";
    let showArchived = false;
    let feedErrors = [];
    // Cloud panel UI prefs (persisted)
    let cloudCollapsed = (localStorage.getItem("sai-reader-cloud-collapsed") === "1");
    let cloudScope = localStorage.getItem("sai-reader-cloud-scope") || "active"; // "active" | "all"
    // Settings: which feed row is currently in edit mode? "{prefix}-{idx}" or null.
    let editingFeed = null;

    // Front Page configuration: which posts go in which slots, plus tagline.
    // Stored as URLs (the post link is the canonical id).
    const FP_STORAGE_KEY = "sai-reader-frontpage-v1";
    let frontpage = loadFrontPage();
    // State for the "pick a starred post" modal
    let fpPickerOpen = null; // null | { slot: "hero" | { type:"selected", idx:0..2 } }

    function loadFrontPage() {
      try {
        const raw = JSON.parse(localStorage.getItem(FP_STORAGE_KEY));
        if (raw && typeof raw === "object") {
          return {
            tagline: raw.tagline || "",
            heroUrl: raw.heroUrl || "",          // pinned Featured post
            selectedUrls: Array.isArray(raw.selectedUrls) ? raw.selectedUrls.slice(0, 6) : [],
            recentCount: raw.recentCount || 6
          };
        }
      } catch (e) { /* ignore */ }
      return { tagline: "", heroUrl: "", selectedUrls: [], recentCount: 6 };
    }
    function saveFrontPage() {
      localStorage.setItem(FP_STORAGE_KEY, JSON.stringify(frontpage));
    }

    function loadTriage() {
      // Try v2 first
      try {
        const v2 = JSON.parse(localStorage.getItem(STORAGE_KEY));
        if (v2) return v2;
      } catch (e) { /* ignore */ }

      // One-time migration from v1 (single category) to v2 (tags array)
      try {
        const v1 = JSON.parse(localStorage.getItem(STORAGE_KEY_OLD));
        if (v1) {
          const migrated = {};
          Object.keys(v1).forEach(url => {
            const old = v1[url] || {};
            migrated[url] = {
              tags: old.category ? [old.category] : [],
              starred: !!old.starred,
              archived: !!old.archived
            };
          });
          localStorage.setItem(STORAGE_KEY, JSON.stringify(migrated));
          return migrated;
        }
      } catch (e) { /* ignore */ }

      return {};
    }
    function saveTriage() {
      localStorage.setItem(STORAGE_KEY, JSON.stringify(triage));
    }
    function getTriage(url) {
      const t = triage[url] || {};
      return {
        tags: Array.isArray(t.tags) ? t.tags : [],
        starred: !!t.starred,
        archived: !!t.archived,
        brief: t.brief || "",
        kicker: t.kicker || "",
        // Stored post metadata — makes each record self-contained & searchable,
        // and lets Picks / Front Page render without the live feed.
        title: t.title || "",
        author: t.author || "",
        sourceName: t.sourceName || "",
        image: t.image || "",
        date: t.date || "",
        excerpt: t.excerpt || "",
        group: t.group || ""
      };
    }
    function setTriage(url, patch) {
      const cur = getTriage(url);
      triage[url] = Object.assign({}, cur, patch);
      saveTriage();
    }
    // Capture a feed item's display metadata into its triage record, so the
    // post can be rendered later even after it leaves the 14-day feed window.
    // Called whenever we touch an item (star/tag/brief) and whenever feeds load.
    // Only fills fields that are currently empty so we never clobber good data
    // with a blank from a partial feed.
    function captureItemMeta(item) {
      if (!item || !item.link) return;
      const cur = triage[item.link] || {};
      const patch = {};
      if (!cur.title && item.title) patch.title = item.title;
      if (!cur.author && item.author) patch.author = item.author;
      if (!cur.sourceName && item.sourceName) patch.sourceName = item.sourceName;
      if ((cur.image === undefined || cur.image === "") && item.image) patch.image = item.image;
      if (!cur.date && item.date) patch.date = item.date instanceof Date ? item.date.toISOString() : item.date;
      if (!cur.excerpt && item.excerpt) patch.excerpt = item.excerpt;
      if (!cur.group && item.group) patch.group = item.group;
      if (Object.keys(patch).length) {
        triage[item.link] = Object.assign({}, cur, patch);
        saveTriage();
      }
    }
    function addTag(url, tag) {
      const t = (tag || "").trim();
      if (!t) return;
      const cur = getTriage(url);
      if (cur.tags.includes(t)) return;
      setTriage(url, { tags: cur.tags.concat([t]) });
    }
    function removeTag(url, tag) {
      const cur = getTriage(url);
      setTriage(url, { tags: cur.tags.filter(x => x !== tag) });
    }

    // Build tag frequency map. scope: "all" (default, every triaged item)
    // or "active" (excludes archived items). Returns Map: tag -> { total, starred }
    function getTagFrequencies(scope) {
      scope = scope || "all";
      const freq = new Map();
      Object.keys(triage).forEach(url => {
        const t = triage[url];
        if (scope === "active" && t.archived) return;
        const tags = Array.isArray(t.tags) ? t.tags : [];
        const isStarred = !!t.starred;
        tags.forEach(tag => {
          const cur = freq.get(tag) || { total: 0, starred: 0 };
          cur.total += 1;
          if (isStarred) cur.starred += 1;
          freq.set(tag, cur);
        });
      });
      return freq;
    }

    /* ============================================================
       FEED FETCHING
       ============================================================ */
    async function fetchFeed(feed, group) {
      // Try each proxy in order. First success wins. If all fail,
      // return the most informative error we got along the way.
      let attempts = [];
      for (let i = 0; i < PROXIES.length; i++) {
        const proxy = PROXIES[i];
        let result;
        try {
          const url = proxy.build(feed.url);
          const res = await fetch(url);
          if (!res.ok) {
            attempts.push({ proxy: proxy.name, error: "HTTP " + res.status });
            continue;
          }
          const xml = await res.text();
          try {
            const items = parseFeed(xml, feed, group);
            return { ok: true, items, viaProxy: proxy.name };
          } catch (parseErr) {
            // Capture a short snippet of the body so we can tell HTML-error-page
            // from genuine-bad-XML at a glance.
            const snippet = (xml || "").trim().slice(0, 200).replace(/\s+/g, " ");
            attempts.push({
              proxy: proxy.name,
              error: parseErr.message || "Parse error",
              snippet
            });
            continue;
          }
        } catch (netErr) {
          attempts.push({ proxy: proxy.name, error: "Network: " + (netErr.message || "fetch failed") });
          continue;
        }
      }
      // All proxies exhausted. Pick the most useful attempt for the error message.
      const best = pickBestAttempt(attempts);
      return {
        ok: false,
        error: best.error,
        snippet: best.snippet || "",
        feedName: feed.name,
        feedUrl: feed.url,
        attempts
      };
    }

    // Prefer parse errors with a snippet (most actionable), then HTTP errors,
    // then network errors. This is what we surface in the UI.
    function pickBestAttempt(attempts) {
      if (!attempts.length) return { error: "No proxies configured" };
      const withSnippet = attempts.find(a => a.snippet);
      if (withSnippet) return withSnippet;
      const httpErr = attempts.find(a => /^HTTP /.test(a.error));
      if (httpErr) return httpErr;
      return attempts[attempts.length - 1];
    }

    function parseFeed(xmlText, feed, group) {
      if (!xmlText || !xmlText.trim()) {
        throw new Error("Empty response");
      }
      const parser = new DOMParser();
      const doc = parser.parseFromString(xmlText, "text/xml");
      const parserError = doc.querySelector("parsererror");
      if (parserError) {
        // Distinguish "looks like HTML" from genuinely garbled XML
        const trimmed = xmlText.trim();
        if (/^<(!doctype|html|head|body)\b/i.test(trimmed) || trimmed.startsWith("<!DOCTYPE")) {
          throw new Error("Got HTML, not RSS (URL likely wrong or behind login)");
        }
        throw new Error("Invalid XML");
      }

      // RSS 2.0 (<rss><channel><item>) or Atom (<feed><entry>)
      const isAtom = doc.documentElement.tagName.toLowerCase() === "feed";
      const itemNodes = isAtom
        ? Array.from(doc.querySelectorAll("entry"))
        : Array.from(doc.querySelectorAll("item"));

      return itemNodes.map(node => parseItem(node, feed, group, isAtom)).filter(Boolean);
    }

    function parseItem(node, feed, group, isAtom) {
      const get = sel => {
        const el = node.querySelector(sel);
        return el ? el.textContent.trim() : "";
      };
      const title = get("title");
      let link = "";
      if (isAtom) {
        const linkEl = Array.from(node.querySelectorAll("link"))
          .find(l => !l.getAttribute("rel") || l.getAttribute("rel") === "alternate");
        link = linkEl ? linkEl.getAttribute("href") : "";
      } else {
        link = get("link");
      }
      const dateStr = get("pubDate") || get("published") || get("updated") || get("dc\\:date");
      const date = dateStr ? new Date(dateStr) : null;

      // Author: try dc:creator, author, then fall back to feed author.
      let author = get("dc\\:creator") || feed.author;
      const authorEl = node.querySelector("author");
      if (authorEl && !author) {
        const nameEl = authorEl.querySelector("name");
        author = nameEl ? nameEl.textContent.trim() : authorEl.textContent.trim();
      }

      // Excerpt: description or summary or content. Strip HTML.
      const rawDesc = get("description") || get("summary") || get("content\\:encoded") || get("content");
      const excerpt = stripHtml(rawDesc).slice(0, 320);

      // Image: try enclosure, media:content, media:thumbnail, then first <img> in description.
      let image = "";
      const enclosure = node.querySelector("enclosure[type^='image']");
      if (enclosure) image = enclosure.getAttribute("url") || "";
      if (!image) {
        const media = node.querySelector("media\\:content, media\\:thumbnail");
        if (media) image = media.getAttribute("url") || "";
      }
      if (!image && rawDesc) {
        const m = rawDesc.match(/<img[^>]+src=["']([^"']+)["']/i);
        if (m) image = m[1];
      }

      if (!title || !link) return null;

      return {
        title,
        link,
        date,
        excerpt,
        image,
        author,
        sourceName: feed.name,
        group
      };
    }

    function stripHtml(s) {
      if (!s) return "";
      const div = document.createElement("div");
      div.innerHTML = s;
      return (div.textContent || div.innerText || "").trim().replace(/\s+/g, " ");
    }

    async function loadAllFeeds(forceRefresh = false) {
      // Cache check
      if (!forceRefresh) {
        const cached = loadCache();
        if (cached) {
          allItems = cached.items.map(i => ({ ...i, date: i.date ? new Date(i.date) : null }));
          allItems.forEach(captureItemMeta);
          updateLastFetch(new Date(cached.fetchedAt));
          render();
          return;
        }
      }

      setStatus("Loading feeds…");
      const refreshBtn = document.getElementById("refresh-btn");
      refreshBtn.disabled = true;
      refreshBtn.textContent = "↻ Loading…";

      feedErrors = [];
      const tasks = [
        ...SCIENTIST_FEEDS.map(f => fetchFeed(f, "scientists")),
        ...WRITER_FEEDS.map(f => fetchFeed(f, "writers"))
      ];
      const results = await Promise.all(tasks);

      let items = [];
      results.forEach(r => {
        if (r.ok) items = items.concat(r.items);
        else feedErrors.push({
          name: r.feedName,
          url: r.feedUrl,
          error: r.error,
          snippet: r.snippet || "",
          attempts: r.attempts || []
        });
      });

      // Filter to time window, sort by date desc
      const cutoff = Date.now() - TIME_WINDOW_DAYS * 24 * 60 * 60 * 1000;
      items = items.filter(it => it.date && it.date.getTime() >= cutoff);
      items.sort((a, b) => (b.date?.getTime() || 0) - (a.date?.getTime() || 0));

      allItems = items;
      // Backfill stored metadata for any triaged post that appears in the feed.
      items.forEach(captureItemMeta);
      saveCache(items);
      updateLastFetch(new Date());

      refreshBtn.disabled = false;
      refreshBtn.textContent = "↻ Refresh feeds";

      render();
    }

    function loadCache() {
      try {
        const raw = JSON.parse(localStorage.getItem(FEED_CACHE_KEY));
        if (!raw) return null;
        if (Date.now() - raw.fetchedAt > FEED_CACHE_TTL_MS) return null;
        return raw;
      } catch (e) { return null; }
    }
    function saveCache(items) {
      try {
        localStorage.setItem(FEED_CACHE_KEY, JSON.stringify({
          fetchedAt: Date.now(),
          items
        }));
      } catch (e) { /* localStorage full or disabled, fail silently */ }
    }

    function setStatus(msg, isError = false) {
      const el = document.getElementById("feed-status");
      el.textContent = msg;
      el.classList.toggle("error", isError);
      el.classList.toggle("hidden", !msg);
    }

    function updateLastFetch(d) {
      const el = document.getElementById("last-fetch");
      if (!d) { el.textContent = ""; return; }
      const s = d.toLocaleString(undefined, {
        month: "short", day: "numeric",
        hour: "numeric", minute: "2-digit"
      });
      el.textContent = "Last refresh: " + s;
    }

    /* ============================================================
       RENDERING
       ============================================================ */
    function render() {
      // Counts
      const sciCount = allItems.filter(i => i.group === "scientists" && !getTriage(i.link).archived).length;
      const wriCount = allItems.filter(i => i.group === "writers" && !getTriage(i.link).archived).length;
      const allCount = sciCount + wriCount;
      const picksCount = Object.values(triage).filter(t => t.starred).length;

      document.getElementById("count-scientists").textContent = `· ${sciCount}`;
      document.getElementById("count-writers").textContent = `· ${wriCount}`;
      document.getElementById("count-all").textContent = `· ${allCount}`;
      document.getElementById("count-picks").textContent = `· ${picksCount}`;

      // Feed errors banner
      const errEl = document.getElementById("feed-errors");
      if (feedErrors.length) {
        errEl.classList.remove("hidden");
        errEl.innerHTML = `
      <div class="err-head">Some feeds did not load (${feedErrors.length})</div>
      <ul>
        ${feedErrors.map(e => {
          const attemptsList = (e.attempts || []).map(a =>
            `<li>${escapeHtml(a.proxy)} → ${escapeHtml(a.error)}</li>`
          ).join("");
          const snippetBlock = e.snippet
            ? `<div class="err-snippet"><b>Response sample:</b> ${escapeHtml(e.snippet)}…</div>`
            : "";
          const detail = (attemptsList || snippetBlock)
            ? `<details>
                 <summary>Show diagnostic detail</summary>
                 <div class="err-detail">
                   ${attemptsList ? `<b>Tried:</b><ul style="margin-top: 0.2rem;">${attemptsList}</ul>` : ""}
                   ${snippetBlock}
                   ${e.url ? `<div class="err-url" style="margin-top: 0.4rem;"><b>URL:</b> ${escapeHtml(e.url)}</div>` : ""}
                 </div>
               </details>`
            : "";
          return `
            <li>
              <span class="err-name">${escapeHtml(e.name)}</span> —
              <span class="err-msg">${escapeHtml(e.error)}</span>
              ${detail}
            </li>`;
        }).join("")}
      </ul>`;
      } else {
        errEl.classList.add("hidden");
      }

      // Filter bar — render active tag filters
      renderFilterBar();

      // View routing
      const showFeed = ["scientists", "writers", "all"].includes(activeTab);
      document.getElementById("view-feed").classList.toggle("hidden", !showFeed);
      document.getElementById("view-picks").classList.toggle("hidden", activeTab !== "picks");
      document.getElementById("view-frontpage").classList.toggle("hidden", activeTab !== "frontpage");
      document.getElementById("view-settings").classList.toggle("hidden", activeTab !== "settings");
      document.getElementById("filter-bar").classList.toggle("hidden", activeTab === "settings" || activeTab === "picks" || activeTab === "frontpage");

      if (showFeed) renderFeedView();
      else if (activeTab === "picks") renderPicksView();
      else if (activeTab === "frontpage") renderFrontPageView();
      else if (activeTab === "settings") renderSettingsView();

      setStatus(""); // hide if anything else is going to render
    }

    function renderFilterBar() {
      const el = document.getElementById("filter-tags");
      if (!activeTagFilters.length) {
        el.innerHTML = `<span style="color: var(--ink-faint); font-style: italic; font-size: 0.74rem;">none — click any tag chip on an item to filter</span>`;
        return;
      }
      el.innerHTML = activeTagFilters.map(t => `
    <span class="filter-tag-chip" data-tag="${escapeHtml(t)}">
      ${escapeHtml(t)} <span class="x">×</span>
    </span>`).join("");
      el.querySelectorAll(".filter-tag-chip").forEach(chip => {
        chip.addEventListener("click", () => {
          activeTagFilters = activeTagFilters.filter(t => t !== chip.dataset.tag);
          render();
        });
      });
    }

    // Cloud panel that appears below the filter bar on Scientists/Writers/All tabs.
    // Shows all tags ever used (or active-only, toggleable), and counts.
    // Click a tag to add/remove it from the active filter.
    function renderCloudPanel() {
      const mount = document.getElementById("cloud-panel-mount");
      const freq = getTagFrequencies(cloudScope);
      const sortedTags = Array.from(freq.entries())
        .sort((a, b) => b[1].total - a[1].total || a[0].localeCompare(b[0]));

      if (!sortedTags.length) {
        mount.innerHTML = `<div class="cloud-panel ${cloudCollapsed ? 'collapsed' : ''}">
      <button class="cloud-panel-toggle" id="cloud-toggle">
        <span>Tags <span class="summary">no tags yet — start tagging items below</span></span>
        <span class="chevron">▾</span>
      </button>
      <div class="cloud-panel-body">
        <div style="color: var(--ink-faint); font-style: italic; font-size: 0.85rem;">No tags yet. Add tags to items below and they'll appear here.</div>
      </div>
    </div>`;
        attachCloudToggle();
        return;
      }

      // Sizing — same scheme as Picks cloud, slightly smaller range
      const maxFreq = sortedTags[0][1].total;
      const minFreq = sortedTags[sortedTags.length - 1][1].total;
      const sizeFor = f => {
        if (maxFreq === minFreq) return 0.82;
        const ratio = (f - minFreq) / (maxFreq - minFreq);
        return (0.74 + ratio * 0.45).toFixed(2); // 0.74rem to 1.19rem
      };

      const cloudHtml = sortedTags.map(([tag, f]) => {
        const active = activeTagFilters.includes(tag);
        return `<span class="cloud-tag ${active ? 'active' : ''}" data-tag="${escapeHtml(tag)}" style="font-size: ${sizeFor(f.total)}rem;">
      ${escapeHtml(tag)}<span class="freq">${f.total}</span>
    </span>`;
      }).join("");

      // Summary line for collapsed state
      const top3 = sortedTags.slice(0, 3).map(([tag, f]) => `${tag} (${f.total})`).join(" · ");
      const summary = `${sortedTags.length} tag${sortedTags.length === 1 ? '' : 's'} · top: ${top3}`;

      // Filter clear button
      const clearBtn = activeTagFilters.length
        ? `<button class="cloud-clear" id="cloud-clear">Clear ${activeTagFilters.length} filter${activeTagFilters.length > 1 ? 's' : ''}</button>`
        : `<span></span>`;

      mount.innerHTML = `
    <div class="cloud-panel ${cloudCollapsed ? 'collapsed' : ''}">
      <button class="cloud-panel-toggle" id="cloud-toggle">
        <span>Tags <span class="summary">${escapeHtml(summary)}</span></span>
        <span class="chevron">▾</span>
      </button>
      <div class="cloud-panel-body">
        <div class="cloud-panel-controls">
          <div class="cloud-toggle-group" role="tablist">
            <button class="${cloudScope === 'active' ? 'active' : ''}" data-scope="active" title="Tags from non-archived items only">Active</button>
            <button class="${cloudScope === 'all' ? 'active' : ''}" data-scope="all" title="Tags from all items including archived">All including archived</button>
          </div>
          ${clearBtn}
        </div>
        <div class="tag-cloud">${cloudHtml}</div>
      </div>
    </div>`;

      attachCloudToggle();

      // Cloud tag click toggles filter
      mount.querySelectorAll(".cloud-tag").forEach(el => {
        el.addEventListener("click", () => {
          const tag = el.dataset.tag;
          if (activeTagFilters.includes(tag)) {
            activeTagFilters = activeTagFilters.filter(t => t !== tag);
          } else {
            activeTagFilters = activeTagFilters.concat([tag]);
          }
          render();
        });
      });

      // Scope toggle
      mount.querySelectorAll(".cloud-toggle-group button").forEach(btn => {
        btn.addEventListener("click", () => {
          cloudScope = btn.dataset.scope;
          localStorage.setItem("sai-reader-cloud-scope", cloudScope);
          render();
        });
      });

      // Clear filter
      const cb = document.getElementById("cloud-clear");
      if (cb) {
        cb.addEventListener("click", () => {
          activeTagFilters = [];
          render();
        });
      }
    }

    function attachCloudToggle() {
      const btn = document.getElementById("cloud-toggle");
      if (!btn) return;
      btn.addEventListener("click", () => {
        cloudCollapsed = !cloudCollapsed;
        localStorage.setItem("sai-reader-cloud-collapsed", cloudCollapsed ? "1" : "0");
        const panel = btn.closest(".cloud-panel");
        if (panel) panel.classList.toggle("collapsed", cloudCollapsed);
      });
    }

    function renderFeedView() {
      renderCloudPanel();

      let items = allItems.filter(it => {
        if (activeTab === "scientists" && it.group !== "scientists") return false;
        if (activeTab === "writers" && it.group !== "writers") return false;
        const t = getTriage(it.link);
        if (!showArchived && t.archived) return false;
        // AND-filter: every active filter tag must be present on this item
        if (activeTagFilters.length) {
          for (const ft of activeTagFilters) {
            if (!t.tags.includes(ft)) return false;
          }
        }
        if (searchQuery) {
          const q = searchQuery.toLowerCase();
          const inText =
            it.title.toLowerCase().includes(q) ||
            (it.author || "").toLowerCase().includes(q) ||
            (it.excerpt || "").toLowerCase().includes(q);
          const inTags = t.tags.some(tg => tg.toLowerCase().includes(q));
          if (!inText && !inTags) return false;
        }
        return true;
      });

      const grid = document.getElementById("item-grid");
      if (!items.length) {
        grid.innerHTML = `<div class="empty">No items in this view.</div>`;
        return;
      }
      grid.innerHTML = items.map(itemCard).join("");
      attachItemHandlers();
    }

    function renderPicksView() {
      const view = document.getElementById("view-picks");
      const starred = allStarredResolved();

      if (!starred.length) {
        view.innerHTML = `<div class="empty">No starred items yet. Triage from the Scientists or Writers tabs to build your weekly picks.</div>`;
        return;
      }

      // Build frequency map from starred items only.
      // Also collect untagged starred items.
      const tagFreq = new Map();
      let untaggedCount = 0;
      starred.forEach(it => {
        const t = getTriage(it.link);
        if (!t.tags.length) untaggedCount++;
        t.tags.forEach(tag => {
          tagFreq.set(tag, (tagFreq.get(tag) || 0) + 1);
        });
      });

      // Sort tags by frequency desc, then alpha
      const sortedTags = Array.from(tagFreq.entries())
        .sort((a, b) => b[1] - a[1] || a[0].localeCompare(b[0]));

      // Apply active tag filters (AND); search also applies in picks
      let visibleItems = starred.filter(it => {
        const t = getTriage(it.link);
        if (activeTagFilters.length) {
          for (const ft of activeTagFilters) {
            if (!t.tags.includes(ft)) return false;
          }
        }
        if (searchQuery) {
          const q = searchQuery.toLowerCase();
          const inText =
            it.title.toLowerCase().includes(q) ||
            (it.author || "").toLowerCase().includes(q) ||
            (it.excerpt || "").toLowerCase().includes(q);
          const inTags = t.tags.some(tg => tg.toLowerCase().includes(q));
          if (!inText && !inTags) return false;
        }
        return true;
      });

      // Tag cloud sizing: linear interpolation between min and max font sizes
      const maxFreq = sortedTags.length ? sortedTags[0][1] : 1;
      const minFreq = sortedTags.length ? sortedTags[sortedTags.length - 1][1] : 1;
      const sizeFor = freq => {
        if (maxFreq === minFreq) return 0.85;
        const ratio = (freq - minFreq) / (maxFreq - minFreq);
        return (0.78 + ratio * 0.55).toFixed(2); // 0.78rem to 1.33rem
      };

      // Header / clear button
      const filterActive = activeTagFilters.length > 0;
      const headRight = filterActive
        ? `<button class="clear-filter" id="clear-pick-filters">Clear filter (${activeTagFilters.length})</button>`
        : "";

      let cloudHtml = sortedTags.map(([tag, freq]) => {
        const active = activeTagFilters.includes(tag);
        return `<span class="cloud-tag ${active ? 'active' : ''}" data-tag="${escapeHtml(tag)}" style="font-size: ${sizeFor(freq)}rem;">
      ${escapeHtml(tag)}<span class="freq">${freq}</span>
    </span>`;
      }).join("");
      if (!cloudHtml) {
        cloudHtml = `<span style="color: var(--ink-faint); font-style: italic;">No tags yet on starred items.</span>`;
      }

      // Sort: items with more matched tags first (when filtering), else by date desc
      visibleItems.sort((a, b) => (b.date?.getTime() || 0) - (a.date?.getTime() || 0));

      const meta = filterActive
        ? `${visibleItems.length} of ${starred.length} starred · filtered by ${activeTagFilters.length} tag${activeTagFilters.length > 1 ? 's' : ''}`
        : `${starred.length} starred`;

      let untaggedNote = "";
      if (untaggedCount && !filterActive) {
        untaggedNote = `<div style="font-family: var(--mono); font-size: 0.72rem; color: var(--amber); margin-top: 0.6rem;">
      ${untaggedCount} starred item${untaggedCount > 1 ? 's have' : ' has'} no tags yet.
    </div>`;
      }

      view.innerHTML = `
    <div class="tag-cloud-wrap">
      <div class="tag-cloud-head">
        <span>Tags on starred items</span>
        ${headRight}
      </div>
      <div class="tag-cloud">${cloudHtml}</div>
      ${untaggedNote}
    </div>
    <div class="picks-list-head">
      ★ Picks <span class="meta">${meta}</span>
    </div>
    <div class="item-grid">
      ${visibleItems.length ? visibleItems.map(itemCard).join("") : '<div class="empty">No starred items match the active filter.</div>'}
    </div>`;

      // Cloud tag click toggles filter
      view.querySelectorAll(".cloud-tag").forEach(el => {
        el.addEventListener("click", () => {
          const tag = el.dataset.tag;
          if (activeTagFilters.includes(tag)) {
            activeTagFilters = activeTagFilters.filter(t => t !== tag);
          } else {
            activeTagFilters = activeTagFilters.concat([tag]);
          }
          render();
        });
      });
      const clearBtn = document.getElementById("clear-pick-filters");
      if (clearBtn) {
        clearBtn.addEventListener("click", () => {
          activeTagFilters = [];
          render();
        });
      }

      attachItemHandlers();
    }

    /* ============================================================
       FRONT PAGE BUILDER
       ============================================================ */
    // Look up the item object for a given URL, from allItems.
    // Returns null if not found (e.g. item rotated out of the time window).
    function findItemByUrl(url) {
      if (!url) return null;
      return allItems.find(it => it.link === url) || null;
    }

    // All starred items, sorted by date desc (newest first).
    function starredItemsByDate() {
      return allItems
        .filter(it => getTriage(it.link).starred)
        .sort((a, b) => (b.date?.getTime() || 0) - (a.date?.getTime() || 0));
    }

    // Resolve a post for display from EITHER the live feed (freshest) OR the
    // metadata stored on its triage record. This is the core of the fix: Picks,
    // the Front Page builder, and the recent list all use this, so nothing
    // depends on the post still being in the 14-day feed window.
    function resolveItem(url) {
      if (!url) return null;
      const live = findItemByUrl(url);
      if (live) return live;
      const t = triage[url];
      if (t && t.title) {
        return {
          link: url,
          title: t.title,
          author: t.author || "",
          sourceName: t.sourceName || "",
          date: t.date ? new Date(t.date) : null,
          image: t.image || "",
          excerpt: t.excerpt || "",
          group: t.group || "",
          _fromArchive: true   // marker: rendered from stored metadata, not live feed
        };
      }
      return null;
    }

    // All starred posts, resolved from feed-or-archive, newest first.
    // Replaces the old starredItemsByDate() which only saw the live feed.
    function allStarredResolved() {
      return Object.keys(triage)
        .filter(url => triage[url] && triage[url].starred)
        .map(resolveItem)
        .filter(Boolean)
        .sort((a, b) => (b.date ? b.date.getTime() : 0) - (a.date ? a.date.getTime() : 0));
    }
    
    // Compute which posts auto-fill the "Recent Posts" sidebar.
    // We exclude anything already in Hero or Selected so the same post doesn't
    // appear twice on the front page.
    function recentSidebarItems() {
      const exclude = new Set([frontpage.heroUrl, ...frontpage.selectedUrls].filter(Boolean));
      return starredItemsByDate()
        .filter(it => !exclude.has(it.link))
        .slice(0, frontpage.recentCount || 6);
    }

    function renderFrontPageView() {
      const view = document.getElementById("view-frontpage");
      const starred = allStarredResolved();
      const heroItem = resolveItem(frontpage.heroUrl);
      const selectedItems = (frontpage.selectedUrls || []).map(resolveItem);

      // Validate: are any slot URLs pointing to items that no longer exist?
      // (e.g. they aged out of the 14-day window). Surface that.
      const heroMissing = !!frontpage.heroUrl && !heroItem;
      const selMissing = (frontpage.selectedUrls || []).filter(u => u && !resolveItem(u));      // No starred items at all? Show a helpful empty state.
      if (!starred.length) {
        view.innerHTML = `
      <div class="fp-wrap">
        <div class="empty">
          To build a front page, first star at least one item from the Scientists or Writers tabs.
          Add an Editorial Brief to each starred item — those bullets become the deck on the front page
          and the text of each post in the social-media thread.
        </div>
      </div>`;
        return;
      }

      view.innerHTML = `
    <div class="fp-wrap">
      <p class="fp-intro">
        The front page is always current. Pick a Hero (1) and Selected (3) from your starred items.
        The Recent Posts sidebar fills automatically with the ${frontpage.recentCount} most recent stars
        not already in those slots. Editorial Briefs you've written appear on the front page as the deck;
        if a slot has no brief, the RSS excerpt is used as a fallback.
      </p>

      ${(heroMissing || selMissing.length) ? `
        <div class="feed-error-list" style="margin-bottom: 1.2rem;">
          <div class="err-head">Some slot assignments need attention</div>
          <ul>
            ${heroMissing ? `<li><span class="err-name">Hero</span> — assigned post is no longer in the feed window. Pick another.</li>` : ""}
            ${selMissing.length ? `<li><span class="err-name">Selected</span> — ${selMissing.length} assigned post${selMissing.length > 1 ? 's are' : ' is'} no longer in the feed window. Pick replacement${selMissing.length > 1 ? 's' : ''}.</li>` : ""}
          </ul>
        </div>` : ""}

      <div class="fp-section">
        <h2>Tagline <em>(optional)</em></h2>
        <p class="help">Replaces the "Week in Review" banner on the front page. A short editorial line — what's the through-line of what you're promoting right now?</p>
        <input type="text" id="fp-tagline" class="fp-tagline-input" maxlength="240"
               placeholder="e.g. This week: lead poisoning, AI bioweapon risk, and the gold-standard double standard."
               value="${escapeHtml(frontpage.tagline || "")}">
      </div>

      <div class="fp-section">
        <h2>Hero <em>(1 post)</em></h2>
        <p class="help">The lead post on the front page. Gets the largest treatment with image, title, deck, and standfirst.</p>
        <div class="fp-hero-area">
          ${renderSlot("hero", heroItem)}
          <div style="font-family: var(--sans); font-size: 0.78rem; color: var(--ink-faint); padding: 1rem; line-height: 1.5;">
            <div style="font-weight: 600; color: var(--ink); margin-bottom: 0.4rem; letter-spacing: 0.05em; text-transform: uppercase; font-size: 0.7rem;">Tip</div>
            The hero is your strongest piece of the moment. Pick something with a strong image and an Editorial Brief written.
          </div>
        </div>
      </div>

      <div class="fp-section">
        <h2>Selected Posts <em>(up to 6)</em></h2>
        <p class="help">Six posts shown below the featured item. Newest promotion goes to the top; the rest shift down. A post pushed past six leaves the front page but stays starred in Picks.</p>
        <div class="fp-selected-area">
          ${[0, 1, 2, 3, 4, 5].map(i => renderSlot({ type: "selected", idx: i }, selectedItems[i])).join("")}
        </div>
      </div>



      <div class="fp-export-bar">
        <div class="fp-export-status" id="fp-export-status">${exportStatusText(heroItem, selectedItems)}</div>
        <div class="fp-export-actions">
          <button class="fp-export-btn secondary" id="fp-clear-btn">Clear all slots</button>
          <button class="fp-export-btn primary" id="fp-export-btn">Download state.json</button>
        </div>
      </div>
    </div>
  `;

      attachFrontPageHandlers();

      // If a picker is open, render it on top
      if (fpPickerOpen) renderPicker();
    }

    function exportStatusText(heroItem, selectedItems) {
      const filled = (heroItem ? 1 : 0) + selectedItems.filter(Boolean).length;
      const total = 1 + 3;
      if (filled === total) return `Ready · ${total}/${total} slots filled`;
      return `${filled}/${total} slots filled — you can still export, missing slots will be omitted`;
    }

    function renderSlot(slot, item) {
      const slotKey = typeof slot === "string" ? slot : `${slot.type}-${slot.idx}`;
      const slotLabel = slot === "hero" ? "Hero" : `Selected ${slot.idx + 1}`;
      const slotClass = slot === "hero" ? "hero" : "selected";

      if (!item) {
        return `
      <div class="fp-slot ${slotClass}" data-slot-key="${slotKey}">
        <div class="fp-slot-label">${slotLabel}</div>
        <div class="fp-slot-empty">
          <div>
            <div style="margin-bottom: 0.6rem;">No post assigned</div>
            <button data-action="pick" data-slot-key="${slotKey}">Pick a post</button>
          </div>
        </div>
      </div>`;
      }

      const t = getTriage(item.link);
      const dateStr = item.date ? item.date.toLocaleDateString(undefined, { month: "short", day: "numeric", year: "numeric" }) : "";
      const thumb = item.image
        ? `<img class="fp-slot-thumb" src="${escapeHtml(item.image)}" alt="" loading="lazy" onerror="this.outerHTML='<div class=\\'fp-slot-noimg\\'>NO IMAGE</div>'">`
        : `<div class="fp-slot-noimg">NO IMAGE</div>`;

      // Default kicker = first tag if any. User can override per-slot, but we
      // store kicker on the post (in triage) so it's reusable.
      const defaultKicker = (t.tags[0] || "").toUpperCase();
      const kickerValue = t.kicker || defaultKicker;

      return `
    <div class="fp-slot ${slotClass} filled" data-slot-key="${slotKey}">
      <div class="fp-slot-label">${slotLabel}</div>
      <div class="fp-slot-content">
        ${thumb}
        <div class="fp-slot-kicker-row">
          <input type="text" class="fp-slot-kicker" data-action="kicker" data-link="${escapeHtml(item.link)}"
                 placeholder="Kicker (e.g. ENVIRONMENTAL HEALTH)"
                 value="${escapeHtml(kickerValue)}">
        </div>
        <div class="fp-slot-title"><a href="${escapeHtml(item.link)}" target="_blank" rel="noopener">${escapeHtml(item.title)}</a></div>
        <div class="fp-slot-meta">
          <span class="author">${escapeHtml(item.author || "")}</span>
          · <i>${escapeHtml(item.sourceName)}</i>
          · ${dateStr}
        </div>
        <div class="fp-slot-brief-label">Editorial Brief</div>
        <textarea class="fp-slot-brief" data-action="brief" data-link="${escapeHtml(item.link)}"
                  placeholder="• A short bullet summarizing the post&#10;• Why it matters">${escapeHtml(t.brief || "")}</textarea>
        <div class="fp-slot-actions">
          <button class="fp-slot-action" data-action="pick" data-slot-key="${slotKey}">Replace</button>
          <button class="fp-slot-action danger" data-action="clear-slot" data-slot-key="${slotKey}">Remove</button>
        </div>
      </div>
    </div>`;
    }

    function attachFrontPageHandlers() {
      // Tagline
      const tagEl = document.getElementById("fp-tagline");
      if (tagEl) {
        tagEl.addEventListener("input", () => {
          frontpage.tagline = tagEl.value;
          saveFrontPage();
          // No re-render — would lose focus
        });
      }

      // Pick / Replace buttons → open picker
      document.querySelectorAll('[data-action="pick"]').forEach(btn => {
        btn.addEventListener("click", () => {
          fpPickerOpen = { slotKey: btn.dataset.slotKey };
          renderPicker();
        });
      });

      // Remove → clear slot
      document.querySelectorAll('[data-action="clear-slot"]').forEach(btn => {
        btn.addEventListener("click", () => {
          assignSlot(btn.dataset.slotKey, null);
          render();
        });
      });

      // Kicker per-slot — saves on each post (triage.kicker)
      document.querySelectorAll('.fp-slot-kicker[data-action="kicker"]').forEach(el => {
        el.addEventListener("input", () => {
          setTriage(el.dataset.link, { kicker: el.value });
          // No re-render — keep focus
        });
      });

      // Brief per-slot — same field as on item cards, saves on triage.brief
      document.querySelectorAll('.fp-slot-brief[data-action="brief"]').forEach(el => {
        el.addEventListener("input", () => {
          setTriage(el.dataset.link, { brief: el.value });
          // No re-render — keep focus
        });
      });

      // Clear all slots
      const clearBtn = document.getElementById("fp-clear-btn");
      if (clearBtn) {
        clearBtn.addEventListener("click", () => {
          if (!confirm("Clear all slot assignments? Your tagline and per-post briefs are preserved.")) return;
          frontpage.heroUrl = "";
          frontpage.selectedUrls = [];
          saveFrontPage();
          render();
        });
      }

      // Export
      const exportBtn = document.getElementById("fp-export-btn");
      if (exportBtn) {
        exportBtn.addEventListener("click", exportFrontPageJson);
      }
    }

    // Pure helper: write a slot key ("hero" or "selected-{0,1,2}") with a URL or null.
    function assignSlot(slotKey, url) {
      if (slotKey === "hero") {
        frontpage.heroUrl = url || "";
      } else if (slotKey.startsWith("selected-")) {
        const idx = parseInt(slotKey.split("-")[1], 10);
        const list = frontpage.selectedUrls.slice();
        while (list.length < 3) list.push("");
        list[idx] = url || "";
        // Compact trailing empties — but keep positional index integrity. Just store as-is.
        frontpage.selectedUrls = list;
      }
      saveFrontPage();
    }

    // Promote a post to the top of Selected. Newest-promoted goes to index 0,
    // everything shifts down, list is capped at 6. A post pushed past 6 falls off
    // the front page but remains starred (still in Picks). De-dupes so a post
    // can't appear twice, and never duplicates the Featured post.
    function promoteToSelected(url) {
      if (!url) return;
      let list = (frontpage.selectedUrls || []).filter(u => u && u !== url);
      list.unshift(url);
      if (frontpage.heroUrl === url) frontpage.heroUrl = ""; // can't be both
      frontpage.selectedUrls = list.slice(0, 6);
      saveFrontPage();
    }

    // Pin a post as the Featured (hero). If it was in Selected, remove it there
    // so the seven slots stay distinct.
    function setFeatured(url) {
      frontpage.heroUrl = url || "";
      if (url) frontpage.selectedUrls = (frontpage.selectedUrls || []).filter(u => u !== url);
      saveFrontPage();
    }

    function removeFromSelected(url) {
      frontpage.selectedUrls = (frontpage.selectedUrls || []).filter(u => u !== url);
      saveFrontPage();
    }

    function renderPicker() {
      // Remove any existing picker first
      const existing = document.getElementById("fp-modal-backdrop");
      if (existing) existing.remove();

      if (!fpPickerOpen) return;

      const starred = starredItemsByDate();
      const slotKey = fpPickerOpen.slotKey;
      const slotLabel = slotKey === "hero"
        ? "Hero"
        : `Selected ${parseInt(slotKey.split("-")[1], 10) + 1}`;

      // For each starred item, decide if it's already used in another slot
      const usedElsewhere = (url) => {
        if (slotKey === "hero" && url === frontpage.heroUrl) return false; // current slot, not "elsewhere"
        if (slotKey !== "hero") {
          const idx = parseInt(slotKey.split("-")[1], 10);
          if (frontpage.selectedUrls[idx] === url) return false;
        }
        if (frontpage.heroUrl === url) return "Hero";
        const sIdx = frontpage.selectedUrls.indexOf(url);
        if (sIdx >= 0) return `Selected ${sIdx + 1}`;
        return false;
      };

      const itemsHtml = starred.length ? starred.map(it => {
        const used = usedElsewhere(it.link);
        const t = getTriage(it.link);
        const briefBadge = t.brief ? `<span style="color: var(--gold);">brief written</span>` : `<span style="color: var(--amber);">no brief yet</span>`;
        return `
      <div class="fp-pick-item" data-pick-url="${escapeHtml(it.link)}">
        ${it.image ? `<img src="${escapeHtml(it.image)}" alt="">` : `<div class="noimg"></div>`}
        <div>
          <div class="title">${escapeHtml(it.title)}</div>

    function exportFrontPageJson() {
      const heroItem = resolveItem(frontpage.heroUrl);
      const selectedItems = (frontpage.selectedUrls || []).map(resolveItem);
      const recents = [];

      // Build the export object. Each slot serializes the post fields the front
      // page needs, plus the per-post editorial brief and kicker.
      function serialize(item, opts) {
        if (!item) return null;
        const t = getTriage(item.link);
        return {
          title: item.title,
          link: item.link,
          author: item.author || "",
          sourceName: item.sourceName,
          date: item.date ? item.date.toISOString() : null,
          image: item.image || "",
          excerpt: item.excerpt || "",
          brief: t.brief || "",
          kicker: t.kicker || (t.tags[0] || "").toUpperCase(),
          tags: t.tags
        };
      }

      const out = {
        schemaVersion: 2,
        generatedAt: new Date().toISOString(),
        tagline: frontpage.tagline || "",
        hero: serialize(heroItem),
        selected: selectedItems.map(serialize).filter(Boolean),
        recent: recents.map(serialize),
        feeds: {
          scientists: SCIENTIST_FEEDS.map(f => ({ name: f.name, author: f.author || "", url: f.url })),
          writers: WRITER_FEEDS.map(f => ({ name: f.name, author: f.author || "", url: f.url }))
        }
      };

      const json = JSON.stringify(out, null, 2);
      const blob = new Blob([json], { type: "application/json" });
      const url = URL.createObjectURL(blob);
      const a = document.createElement("a");
      a.href = url;
      a.download = "state.json";
      document.body.appendChild(a);
      a.click();
      setTimeout(() => {
        URL.revokeObjectURL(url);
        a.remove();
      }, 100);

      const status = document.getElementById("fp-export-status");
      if (status) {
        const filled = (heroItem ? 1 : 0) + selectedItems.filter(Boolean).length;
        status.textContent = `Downloaded · ${filled}/${4} slots + ${recents.length} recent`;
        status.style.color = "var(--green)";
        setTimeout(() => {
          status.style.color = "";
          status.textContent = exportStatusText(heroItem, selectedItems);
        }, 3000);
      }
    }

    function attachAddFeedHandlers(prefix, group) {
      const btn = document.getElementById(`add-${prefix}-btn`);
      const nameEl = document.getElementById(`add-${prefix}-name`);
      const urlEl = document.getElementById(`add-${prefix}-url`);
      const authorEl = document.getElementById(`add-${prefix}-author`);
      const msgEl = document.getElementById(`add-${prefix}-msg`);

      function clearMsg() { msgEl.textContent = ""; msgEl.className = "add-feed-msg"; }
      function setMsg(text, kind) { msgEl.textContent = text; msgEl.className = "add-feed-msg " + (kind || ""); }

      [nameEl, urlEl, authorEl].forEach(el => el.addEventListener("input", clearMsg));

      function submit() {
        const name = nameEl.value.trim();
        const url = urlEl.value.trim();
        const author = authorEl.value.trim();

        if (!name) { setMsg("Display name is required", "error"); nameEl.focus(); return; }
        if (!url) { setMsg("Feed URL is required", "error"); urlEl.focus(); return; }
        if (!/^https?:\/\//i.test(url)) {
          setMsg("URL must start with http:// or https://", "error"); urlEl.focus(); return;
        }

        const allFeeds = SCIENTIST_FEEDS.concat(WRITER_FEEDS);
        if (allFeeds.some(f => f.url === url)) {
          setMsg("That URL is already in your feed list", "error"); return;
        }

        const target = group === "scientists" ? SCIENTIST_FEEDS : WRITER_FEEDS;
        target.push({ name, author, url });
        saveFeeds();

        nameEl.value = "";
        urlEl.value = "";
        authorEl.value = "";
        setMsg("Added · fetching…", "ok");

        // Invalidate cache and re-render settings; then fetch new feed in background
        localStorage.removeItem(FEED_CACHE_KEY);
        render();
        loadAllFeeds(true);
      }

      btn.addEventListener("click", submit);
      // Pressing Enter in any field submits
      [nameEl, urlEl, authorEl].forEach(el => {
        el.addEventListener("keydown", e => {
          if (e.key === "Enter") { e.preventDefault(); submit(); }
        });
      });
    }

    function attachRemoveFeedHandlers() {
      document.querySelectorAll(".feed-remove").forEach(btn => {
        btn.addEventListener("click", () => {
          const prefix = btn.dataset.removePrefix;
          const idx = parseInt(btn.dataset.removeIdx, 10);
          const target = prefix === "sci" ? SCIENTIST_FEEDS : WRITER_FEEDS;
          const feed = target[idx];
          if (!feed) return;
          if (!confirm(`Remove "${feed.name}" from your feed list? Items already triaged from this feed will keep their tags in storage.`)) return;
          target.splice(idx, 1);
          saveFeeds();
          localStorage.removeItem(FEED_CACHE_KEY);
          render();
          loadAllFeeds(true);
        });
      });
    }

    function attachEditFeedHandlers() {
      // Click "Edit" → switch row to edit mode
      document.querySelectorAll(".feed-edit").forEach(btn => {
        btn.addEventListener("click", () => {
          const prefix = btn.dataset.editPrefix;
          const idx = parseInt(btn.dataset.editIdx, 10);
          editingFeed = `${prefix}-${idx}`;
          render();
          // Focus first field
          const row = document.querySelector(`[data-edit-key="${editingFeed}"]`);
          if (row) {
            const firstInput = row.querySelector('input[data-field="name"]');
            if (firstInput) {
              firstInput.focus();
              firstInput.select();
            }
          }
        });
      });

      // Cancel → exit edit mode without saving
      document.querySelectorAll(".feed-edit-cancel").forEach(btn => {
        btn.addEventListener("click", () => {
          editingFeed = null;
          render();
        });
      });

      // Save → validate, write back, exit edit mode, refetch
      document.querySelectorAll(".feed-edit-save").forEach(btn => {
        btn.addEventListener("click", () => saveEditedFeed(btn));
      });

      // Enter inside any field → save; Escape → cancel
      document.querySelectorAll('.feed-row.editing input').forEach(input => {
        input.addEventListener("keydown", e => {
          if (e.key === "Enter") {
            e.preventDefault();
            const row = input.closest(".feed-row");
            const saveBtn = row.querySelector(".feed-edit-save");
            if (saveBtn) saveEditedFeed(saveBtn);
          } else if (e.key === "Escape") {
            editingFeed = null;
            render();
          }
        });
      });
    }

    function saveEditedFeed(btn) {
      const prefix = btn.dataset.editPrefix;
      const idx = parseInt(btn.dataset.editIdx, 10);
      const target = prefix === "sci" ? SCIENTIST_FEEDS : WRITER_FEEDS;
      const orig = target[idx];
      if (!orig) return;

      const row = btn.closest(".feed-row");
      const msgEl = row.querySelector(".feed-edit-msg");
      const setMsg = t => { if (msgEl) msgEl.textContent = t; };
      setMsg("");

      const name = row.querySelector('input[data-field="name"]').value.trim();
      const url = row.querySelector('input[data-field="url"]').value.trim();
      const author = row.querySelector('input[data-field="author"]').value.trim();

      if (!name) { setMsg("Display name is required"); return; }
      if (!url) { setMsg("Feed URL is required"); return; }
      if (!/^https?:\/\//i.test(url)) { setMsg("URL must start with http:// or https://"); return; }

      // Block duplicate URLs (excluding this row)
      const allOthers = SCIENTIST_FEEDS.concat(WRITER_FEEDS).filter(f => f !== orig);
      if (allOthers.some(f => f.url === url)) { setMsg("Another feed already has that URL"); return; }

      // Was anything actually changed?
      const urlChanged = url !== orig.url;
      target[idx] = { name, author, url };
      saveFeeds();

      editingFeed = null;
      // Only invalidate cache and refetch when the URL changed; name/author edits
      // don't require a re-fetch.
      if (urlChanged) {
        localStorage.removeItem(FEED_CACHE_KEY);
        render();
        loadAllFeeds(true);
      } else {
        render();
      }
    }

    /* ============================================================
       BACKUP & RESTORE
       ============================================================ */
    const BACKUP_SCHEMA = 1;

    function buildBackup() {
      return {
        schemaVersion: BACKUP_SCHEMA,
        kind: "sai-reader-backup",
        generatedAt: new Date().toISOString(),
        feeds: {
          scientists: SCIENTIST_FEEDS.map(f => ({ name: f.name, author: f.author || "", url: f.url })),
          writers: WRITER_FEEDS.map(f => ({ name: f.name, author: f.author || "", url: f.url }))
        },
        triage: triage,        // entire triage object (URL-keyed: tags, starred, archived, brief, kicker)
        frontpage: frontpage,  // tagline, heroUrl, selectedUrls, recentCount
        prefs: {
          cloudCollapsed: cloudCollapsed,
          cloudScope: cloudScope
        }
      };
    }

    function downloadBackup() {
      const data = buildBackup();
      const json = JSON.stringify(data, null, 2);
      const blob = new Blob([json], { type: "application/json" });
      const url = URL.createObjectURL(blob);
      const a = document.createElement("a");
      // Filename includes the date for chronological sorting
      const stamp = new Date().toISOString().replace(/[:.]/g, "-").slice(0, 19);
      a.href = url;
      a.download = `sai-reader-backup-${stamp}.json`;
      document.body.appendChild(a);
      a.click();
      setTimeout(() => { URL.revokeObjectURL(url); a.remove(); }, 100);

      setBackupMsg(`Saved · ${Object.keys(triage).length} triaged items, ${SCIENTIST_FEEDS.length + WRITER_FEEDS.length} feeds`, "ok");
    }

    function setBackupMsg(text, kind) {
      const el = document.getElementById("backup-msg");
      if (!el) return;
      el.textContent = text;
      el.style.color = kind === "ok" ? "var(--green)" : kind === "error" ? "var(--accent)" : "var(--ink-faint)";
      if (text) {
        setTimeout(() => {
          if (el.textContent === text) { el.textContent = ""; el.style.color = ""; }
        }, 6000);
      }
    }

    function handleBackupUpload(e) {
      const file = e.target.files && e.target.files[0];
      if (!file) return;
      // Reset the input so the same file can be re-selected later
      e.target.value = "";

      const reader = new FileReader();
      reader.onload = function () {
        let data;
        try {
          data = JSON.parse(reader.result);
        } catch (err) {
          setBackupMsg("Could not parse file as JSON", "error");
          return;
        }
        if (!data || data.kind !== "sai-reader-backup") {
          setBackupMsg("This is not a SAI Reader backup file", "error");
          return;
        }
        if (data.schemaVersion !== BACKUP_SCHEMA) {
          // Don't refuse; just warn. Future-proofing.
          console.warn("Backup schema mismatch:", data.schemaVersion, "expected", BACKUP_SCHEMA);
        }
        const triagedCount = data.triage ? Object.keys(data.triage).length : 0;
        const feedCount = (data.feeds?.scientists?.length || 0) + (data.feeds?.writers?.length || 0);
        if (!confirm(
          `Restore from backup?\n\n` +
          `This will REPLACE your current state with:\n` +
          `  • ${triagedCount} triaged item${triagedCount === 1 ? '' : 's'}\n` +
          `  • ${feedCount} feed${feedCount === 1 ? '' : 's'}\n` +
          `  • Front-page configuration\n\n` +
          `Backup date: ${data.generatedAt ? new Date(data.generatedAt).toLocaleString() : 'unknown'}\n\n` +
          `Your current data will be overwritten and cannot be recovered unless you've already downloaded a backup of it.`
        )) return;

        applyBackup(data);
        setBackupMsg(`Restored · ${triagedCount} items, ${feedCount} feeds`, "ok");
      };
      reader.onerror = function () {
        setBackupMsg("Could not read file", "error");
      };
      reader.readAsText(file);
    }

    function applyBackup(data) {
      if (data.feeds && Array.isArray(data.feeds.scientists) && Array.isArray(data.feeds.writers)) {
        SCIENTIST_FEEDS.length = 0;
        data.feeds.scientists.forEach(f => SCIENTIST_FEEDS.push({ name: f.name, author: f.author || "", url: f.url }));
        WRITER_FEEDS.length = 0;
        data.feeds.writers.forEach(f => WRITER_FEEDS.push({ name: f.name, author: f.author || "", url: f.url }));
        saveFeeds();
      }
      if (data.triage && typeof data.triage === "object") {
        triage = data.triage;
        saveTriage();
      }
      if (data.frontpage && typeof data.frontpage === "object") {
        frontpage = {
          tagline: data.frontpage.tagline || "",
          heroUrl: data.frontpage.heroUrl || "",
          selectedUrls: Array.isArray(data.frontpage.selectedUrls) ? data.frontpage.selectedUrls.slice(0, 3) : [],
          recentCount: data.frontpage.recentCount || 6
        };
        saveFrontPage();
      }
      if (data.prefs && typeof data.prefs === "object") {
        if (typeof data.prefs.cloudCollapsed === "boolean") {
          cloudCollapsed = data.prefs.cloudCollapsed;
          localStorage.setItem("sai-reader-cloud-collapsed", cloudCollapsed ? "1" : "0");
        }
        if (data.prefs.cloudScope) {
          cloudScope = data.prefs.cloudScope;
          localStorage.setItem("sai-reader-cloud-scope", cloudScope);
        }
      }
      // Force a feed re-fetch so the items list matches the restored state
      localStorage.removeItem(FEED_CACHE_KEY);
      render();
      loadAllFeeds(true);
    }

    // Partial restore from a state.json (front-page export). Recovers feeds,
    // tagline, and per-post data (tags, brief, kicker, starred) for whatever
    // posts are mentioned in state.json.
    function handleStateJsonRestore(e) {
      const file = e.target.files && e.target.files[0];
      if (!file) return;
      e.target.value = "";

      const reader = new FileReader();
      reader.onload = function () {
        let data;
        try {
          data = JSON.parse(reader.result);
        } catch (err) {
          setBackupMsg("Could not parse file as JSON", "error");
          return;
        }
        // state.json doesn't have a "kind" field — sniff for hero/selected/feeds shape
        if (!data || (typeof data !== "object") || (data.kind && data.kind !== "sai-reader-backup")) {
          setBackupMsg("File doesn't look like a state.json export", "error");
          return;
        }
        if (data.kind === "sai-reader-backup") {
          // User accidentally picked a real backup; offer to apply it as one
          if (!confirm("This looks like a full backup, not a state.json. Apply it as a full restore?")) return;
          applyBackup(data);
          const ct = data.triage ? Object.keys(data.triage).length : 0;
          setBackupMsg(`Restored · ${ct} items`, "ok");
          return;
        }

        // Count what we can recover
        const posts = [];
        if (data.hero) posts.push(data.hero);
        if (Array.isArray(data.selected)) posts.push(...data.selected);
        if (Array.isArray(data.recent)) posts.push(...data.recent);

        const feedsCount = (data.feeds?.scientists?.length || 0) + (data.feeds?.writers?.length || 0);
        if (!posts.length && !feedsCount && !data.tagline) {
          setBackupMsg("Nothing recoverable in this state.json", "error");
          return;
        }

        if (!confirm(
          `Partial restore from state.json?\n\n` +
          `This will:\n` +
          `  • Add ${feedsCount} feed${feedsCount === 1 ? '' : 's'} (replacing your current feed list)\n` +
          `  • Restore triage (tags, briefs, kicker, starred=true) for ${posts.length} post${posts.length === 1 ? '' : 's'}\n` +
          `  • Set front-page tagline and slot assignments\n\n` +
          `Existing triage on other posts is preserved. Existing data on the ${posts.length} restored post${posts.length === 1 ? '' : 's'} will be overwritten.\n\n` +
          `Continue?`
        )) return;

        // Restore feeds
        if (data.feeds?.scientists && data.feeds?.writers) {
          SCIENTIST_FEEDS.length = 0;
          data.feeds.scientists.forEach(f => SCIENTIST_FEEDS.push({ name: f.name, author: f.author || "", url: f.url }));
          WRITER_FEEDS.length = 0;
          data.feeds.writers.forEach(f => WRITER_FEEDS.push({ name: f.name, author: f.author || "", url: f.url }));
          saveFeeds();
        }

        // Restore triage for each mentioned post
        posts.forEach(p => {
          if (!p || !p.link) return;
          triage[p.link] = {
            tags: Array.isArray(p.tags) ? p.tags.slice() : [],
            starred: true,             // anything in state.json was promoted, so necessarily starred
            archived: false,
            brief: p.brief || "",
            kicker: p.kicker || ""
          };
        });
        saveTriage();

        // Restore front-page config
        frontpage = {
          tagline: data.tagline || "",
          heroUrl: data.hero?.link || "",
          selectedUrls: Array.isArray(data.selected) ? data.selected.map(p => p.link).filter(Boolean) : [],
          recentCount: 6
        };
        saveFrontPage();

        localStorage.removeItem(FEED_CACHE_KEY);
        render();
        loadAllFeeds(true);

        setBackupMsg(`Partial restore · ${posts.length} posts, ${feedsCount} feeds`, "ok");
      };
      reader.onerror = function () {
        setBackupMsg("Could not read file", "error");
      };
      reader.readAsText(file);
    }

    function itemCard(it) {
      const t = getTriage(it.link);
      const dateStr = it.date ? it.date.toLocaleDateString(undefined, { month: "short", day: "numeric", year: "numeric" }) : "";
      const groupLabel = it.group === "scientists" ? "scientist" : "writer";
      const thumb = it.image
        ? `<img class="item-thumb" src="${escapeHtml(it.image)}" alt="" loading="lazy" onerror="this.outerHTML='<div class=\\'item-thumb-placeholder\\'>NO IMAGE</div>'">`
        : `<div class="item-thumb-placeholder">NO IMAGE</div>`;

      const chips = t.tags.map(tag => `
    <span class="tag-chip" data-tag="${escapeHtml(tag)}">
      ${escapeHtml(tag)}<span class="x" data-action="rm-tag">×</span>
    </span>`).join("");

      const classes = ["item"];
      if (t.starred) classes.push("starred");
      if (t.archived) classes.push("archived");

      // Editorial brief field — only shown for starred items
      const briefHtml = t.starred ? `
    <div class="item-brief">
      <div class="item-brief-label">
        Editorial Brief
        <span class="hint">2–4 bullets · used as deck on the front page and as the social-thread post</span>
      </div>
      <textarea data-action="brief" placeholder="• A short bullet summarizing the post&#10;• Why it matters&#10;• Key claim or finding">${escapeHtml(t.brief || "")}</textarea>
    </div>` : "";

      return `
    <article class="${classes.join(' ')}" data-link="${escapeHtml(it.link)}">
      ${thumb}
      <div class="item-body">
        <div class="item-source">${escapeHtml(it.sourceName)}<span class="group-tag">${groupLabel}</span></div>
        <h3 class="item-title"><a href="${escapeHtml(it.link)}" target="_blank" rel="noopener">${escapeHtml(it.title)}</a></h3>
        <p class="item-excerpt">${escapeHtml(it.excerpt)}</p>
        <div class="item-meta">
          <span class="author">${escapeHtml(it.author || "")}</span>
          <span class="dot">·</span>
          <span class="date">${dateStr}</span>
        </div>
        ${briefHtml}
      </div>
      <div class="item-controls">
        <div class="tag-editor ${t.tags.length ? 'has-tags' : ''}" data-action="tag-editor">
          ${chips}
          <input type="text" class="tag-input" placeholder="${t.tags.length ? 'add tag…' : 'add tags…'}" data-action="tag-input" autocomplete="off">
        </div>
        <div class="btn-row">
          <button class="icon-btn star ${t.starred ? 'active' : ''}" data-action="star" title="Star for this week's picks">${t.starred ? '★ Starred' : '☆ Star'}</button>
          <button class="icon-btn archive ${t.archived ? 'active' : ''}" data-action="archive" title="Archive">${t.archived ? 'Archived' : 'Archive'}</button>
        </div>
      </div>
    </article>`;
    }

    function attachItemHandlers() {
      document.querySelectorAll(".item").forEach(el => {
        const link = el.dataset.link;

        // Tag chip: click X removes tag; click chip body adds to filter
        el.querySelectorAll(".tag-chip").forEach(chip => {
          const tag = chip.dataset.tag;
          const x = chip.querySelector(".x");
          if (x) {
            x.addEventListener("click", e => {
              e.stopPropagation();
              removeTag(link, tag);
              render();
            });
          }
          chip.addEventListener("click", e => {
            if (e.target === x) return;
            if (!activeTagFilters.includes(tag)) {
              activeTagFilters = activeTagFilters.concat([tag]);
              render();
            }
          });
        });

        // Tag editor: clicking the editor focuses the input
        const editor = el.querySelector('[data-action="tag-editor"]');
        const input = el.querySelector('[data-action="tag-input"]');
        if (editor && input) {
          editor.addEventListener("click", e => {
            if (e.target.closest(".tag-chip")) return;
            input.focus();
          });
          attachTagInput(input, editor, link);
        }

        const starBtn = el.querySelector('[data-action="star"]');
        if (starBtn) {
          starBtn.addEventListener("click", () => {
            const cur = getTriage(link);
            // Capture the post's metadata at star time so it survives feed rotation.
            const item = allItems.find(i => i.link === link);
            const meta = item ? {
              title: item.title, author: item.author || "", sourceName: item.sourceName || "",
              image: item.image || "", date: item.date ? item.date.toISOString() : "",
              excerpt: item.excerpt || "", group: item.group || ""
            } : {};
            setTriage(link, Object.assign({ starred: !cur.starred }, meta));
            render();
          });
        }
        const archBtn = el.querySelector('[data-action="archive"]');
        if (archBtn) {
          archBtn.addEventListener("click", () => {
            const cur = getTriage(link);
            setTriage(link, { archived: !cur.archived });
            render();
          });
        }

        // Editorial Brief textarea (only present when starred).
        // Save on every keystroke without re-rendering — re-rendering would
        // recreate the textarea and lose focus.
        const briefEl = el.querySelector('[data-action="brief"]');
        if (briefEl) {
          briefEl.addEventListener("input", () => {
            setTriage(link, { brief: briefEl.value });
          });
        }
      });
    }

    /* ============================================================
       TAG INPUT — autocomplete + add/remove
       ============================================================ */
    function attachTagInput(input, editor, link) {
      let suggestions = [];
      let activeIdx = -1;

      function closeSuggest() {
        const drop = editor.querySelector(".tag-suggestions");
        if (drop) drop.remove();
        suggestions = [];
        activeIdx = -1;
      }

      function showSuggest() {
        closeSuggest();
        const q = input.value.trim().toLowerCase();
        const cur = getTriage(link).tags;
        const freq = getTagFrequencies();
        let candidates = Array.from(freq.entries())
          .filter(([tag]) => !cur.includes(tag))
          .filter(([tag]) => !q || tag.toLowerCase().includes(q))
          .sort((a, b) => b[1].total - a[1].total || a[0].localeCompare(b[0]))
          .slice(0, 8);

        suggestions = candidates.map(c => ({ tag: c[0], freq: c[1].total, kind: "existing" }));

        // If query doesn't exact-match any existing tag, add a "create new" entry
        const exact = candidates.some(([tag]) => tag.toLowerCase() === q);
        if (q && !exact) {
          suggestions.push({ tag: input.value.trim(), kind: "new" });
        }

        if (!suggestions.length) return;

        const drop = document.createElement("div");
        drop.className = "tag-suggestions";
        drop.innerHTML = suggestions.map((s, i) => `
      <div class="tag-suggestion ${s.kind === 'new' ? 'create-new' : ''} ${i === activeIdx ? 'active' : ''}" data-idx="${i}">
        <span>${s.kind === 'new' ? '+ create "' + escapeHtml(s.tag) + '"' : escapeHtml(s.tag)}</span>
        ${s.kind === 'existing' ? `<span class="freq">${s.freq}</span>` : ''}
      </div>`).join("");
        editor.appendChild(drop);

        drop.querySelectorAll(".tag-suggestion").forEach(el => {
          el.addEventListener("mousedown", e => {
            e.preventDefault();
            const i = parseInt(el.dataset.idx, 10);
            commit(suggestions[i].tag);
          });
        });
      }

      function commit(tag) {
        if (tag) addTag(link, tag);
        input.value = "";
        closeSuggest();
        render();
      }

      input.addEventListener("input", () => {
        activeIdx = -1;
        showSuggest();
      });

      input.addEventListener("focus", () => {
        showSuggest();
      });

      input.addEventListener("blur", () => {
        // Delay so click on a suggestion can fire first
        setTimeout(closeSuggest, 150);
      });

      input.addEventListener("keydown", e => {
        if (e.key === "Enter" || e.key === ",") {
          e.preventDefault();
          // If a suggestion is highlighted, take it; else commit raw input
          if (activeIdx >= 0 && suggestions[activeIdx]) {
            commit(suggestions[activeIdx].tag);
          } else {
            commit(input.value.trim());
          }
        } else if (e.key === "ArrowDown") {
          if (!suggestions.length) return;
          e.preventDefault();
          activeIdx = (activeIdx + 1) % suggestions.length;
          updateActive();
        } else if (e.key === "ArrowUp") {
          if (!suggestions.length) return;
          e.preventDefault();
          activeIdx = activeIdx <= 0 ? suggestions.length - 1 : activeIdx - 1;
          updateActive();
        } else if (e.key === "Escape") {
          closeSuggest();
        } else if (e.key === "Backspace" && input.value === "") {
          // Remove last tag
          const cur = getTriage(link).tags;
          if (cur.length) {
            e.preventDefault();
            removeTag(link, cur[cur.length - 1]);
            render();
          }
        }
      });

      function updateActive() {
        const drop = editor.querySelector(".tag-suggestions");
        if (!drop) return;
        drop.querySelectorAll(".tag-suggestion").forEach((el, i) => {
          el.classList.toggle("active", i === activeIdx);
        });
      }
    }

    function escapeHtml(s) {
      if (s == null) return "";
      return String(s)
        .replace(/&/g, "&amp;")
        .replace(/</g, "&lt;")
        .replace(/>/g, "&gt;")
        .replace(/"/g, "&quot;")
        .replace(/'/g, "&#39;");
    }

    /* ============================================================
       EVENTS
       ============================================================ */
    document.getElementById("tab-list").addEventListener("click", e => {
      const btn = e.target.closest(".tab");
      if (!btn) return;
      document.querySelectorAll(".tab").forEach(t => t.classList.remove("active"));
      btn.classList.add("active");
      activeTab = btn.dataset.tab;
      // Cancel any in-progress feed edit when navigating away
      if (activeTab !== "settings") editingFeed = null;
      // Close picker if open
      if (activeTab !== "frontpage") closePicker();
      render();
    });

    document.getElementById("refresh-btn").addEventListener("click", () => {
      loadAllFeeds(true);
    });

    document.getElementById("search-input").addEventListener("input", e => {
      searchQuery = e.target.value;
      render();
    });

    document.getElementById("show-archived").addEventListener("change", e => {
      showArchived = e.target.checked;
      render();
    });

    /* ============================================================
       GO
       ============================================================ */
    loadAllFeeds(false);
  </script>
</body>
