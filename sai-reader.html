<!DOCTYPE html>
<!--
  ============================================================
  SAI READER. Editorial triage tool.
  A working surface for Science Notes weekly issue prep.
  ============================================================

  HOW TO USE

  1. Open this file via a local server (VS Code Live Server,
     `python3 -m http.server`) or hosted on the web. Loading
     directly via file:// will fail because the CORS proxy
     refuses requests with a null origin.
  2. Feeds load on first visit. Refresh button forces a re-fetch.
  3. For each item: add tags (free-text, comma or Enter to add),
     star it, archive it. Tag suggestions auto-complete from
     tags you've used before.
  4. Switch to the "Picks" tab to see your starred items with a
     tag cloud and an items list — your worksheet for the issue.

  EDITING THE FEED LIST

  Use the Settings tab. There's an "Add a feed" form for each
  group (Scientists, Writers) and a Remove button next to each
  existing feed. Your edits are stored in this browser's
  localStorage and override the seed defaults baked into the
  file. A "Reset to defaults" button restores the seed list.

  TAGS

  Tags are free-text. Type one and hit Enter or comma. Click a
  tag chip to remove it. Existing tags appear as autocomplete
  suggestions as you type. The vocabulary emerges from your
  actual usage — there's no fixed list.

  STORAGE

  All state lives in browser localStorage on this device.
  Key prefix: "sai-reader-". Clear via DevTools or the
  "Reset all triage" button in Settings.

  CORS

  Feed fetching tries multiple public CORS proxies in cascade:
  corsproxy.io first, then api.allorigins.win as fallback. If
  one returns an error or rate-limits, the next is tried. To
  change the order or add a proxy, search for "PROXIES" in the
  script.
  ============================================================
-->
<html lang="en">

<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>SAI Reader — Editorial triage</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link
    href="https://fonts.googleapis.com/css2?family=Fraunces:opsz,wght@9..144,400;9..144,500;9..144,600;9..144,700&family=IBM+Plex+Sans:wght@400;500;600;700&family=IBM+Plex+Mono:wght@400;500&display=swap"
    rel="stylesheet">
  <style>
    :root {
      --ink: #1a1613;
      --ink-soft: #3a342f;
      --ink-faint: #6b6358;
      --paper: #f7f3ec;
      --paper-warm: #efe9dd;
      --paper-card: #fffdf7;
      --rule: #1a1613;
      --rule-soft: #d4cab5;
      --rule-faint: #e6dfce;
      --accent: #7a1f2b;
      --accent-dk: #5a151f;
      --gold: #b08947;
      --gold-soft: #ebd9b0;
      --green: #2d5a3d;
      --green-soft: #d4e4d8;
      --amber: #b8702e;
      --slate: #4a5560;
      --slate-soft: #d8dde2;

      --serif: 'Fraunces', 'Iowan Old Style', Georgia, serif;
      --sans: 'IBM Plex Sans', -apple-system, sans-serif;
      --mono: 'IBM Plex Mono', monospace;
    }

    * {
      box-sizing: border-box;
      margin: 0;
      padding: 0;
    }

    html {
      scroll-behavior: smooth;
    }

    body {
      font-family: var(--sans);
      background: var(--paper);
      color: var(--ink);
      line-height: 1.5;
      -webkit-font-smoothing: antialiased;
      font-feature-settings: "ss01", "kern";
    }

    /* ─── Masthead ──────────────────────────────────────────── */
    .masthead {
      border-bottom: 3px double var(--rule);
      background: var(--paper);
      padding: 1.4rem 2rem 1rem;
    }

    .masthead-inner {
      max-width: 1400px;
      margin: 0 auto;
      display: flex;
      align-items: baseline;
      justify-content: space-between;
      gap: 2rem;
      flex-wrap: wrap;
    }

    .brand {
      font-family: var(--serif);
      font-weight: 600;
      font-size: 2rem;
      letter-spacing: -0.02em;
      font-variation-settings: "opsz" 144;
    }

    .brand .accent {
      color: var(--accent);
      font-style: italic;
      font-weight: 400;
    }

    .brand .stop {
      color: var(--accent);
    }

    .tagline {
      font-family: var(--sans);
      font-size: 0.7rem;
      letter-spacing: 0.18em;
      text-transform: uppercase;
      color: var(--ink-faint);
      margin-top: 0.2rem;
      font-weight: 500;
    }

    .masthead-meta {
      font-family: var(--mono);
      font-size: 0.72rem;
      color: var(--ink-faint);
      text-align: right;
    }

    .masthead-meta .last-fetch {
      display: block;
    }

    .masthead-meta button {
      margin-top: 0.4rem;
      font-family: var(--sans);
      font-size: 0.7rem;
      letter-spacing: 0.05em;
      text-transform: uppercase;
      font-weight: 600;
      background: var(--ink);
      color: var(--paper);
      border: none;
      padding: 0.4rem 0.8rem;
      cursor: pointer;
      border-radius: 2px;
    }

    .masthead-meta button:hover {
      background: var(--accent);
    }

    .masthead-meta button:disabled {
      opacity: 0.5;
      cursor: wait;
    }

    /* ─── Tabs ──────────────────────────────────────────────── */
    .tabs {
      background: var(--paper);
      border-bottom: 1px solid var(--rule-soft);
      padding: 0 2rem;
      position: sticky;
      top: 0;
      z-index: 10;
    }

    .tabs-inner {
      max-width: 1400px;
      margin: 0 auto;
      display: flex;
      align-items: center;
      justify-content: space-between;
      gap: 2rem;
      flex-wrap: wrap;
    }

    .tab-list {
      display: flex;
      gap: 0;
    }

    .tab {
      font-family: var(--sans);
      font-size: 0.78rem;
      font-weight: 600;
      letter-spacing: 0.06em;
      text-transform: uppercase;
      color: var(--ink-faint);
      background: none;
      border: none;
      padding: 1rem 1.4rem;
      cursor: pointer;
      border-bottom: 3px solid transparent;
      transition: color 0.15s, border-color 0.15s;
    }

    .tab:hover {
      color: var(--ink);
    }

    .tab.active {
      color: var(--ink);
      border-bottom-color: var(--accent);
    }

    .tab .count {
      font-family: var(--mono);
      font-size: 0.68rem;
      color: var(--ink-faint);
      margin-left: 0.4rem;
      font-weight: 400;
    }

    .tab.active .count {
      color: var(--accent);
    }

    .filter-bar {
      display: flex;
      align-items: center;
      gap: 0.8rem;
      font-size: 0.78rem;
      color: var(--ink-soft);
      padding: 0.6rem 0;
    }

    .filter-bar select,
    .filter-bar input[type=text] {
      font-family: var(--sans);
      font-size: 0.78rem;
      padding: 0.35rem 0.55rem;
      border: 1px solid var(--rule-soft);
      background: var(--paper-card);
      color: var(--ink);
      border-radius: 2px;
    }

    .filter-bar input[type=text] {
      min-width: 180px;
    }

    .filter-bar label {
      font-weight: 500;
      color: var(--ink-faint);
      letter-spacing: 0.04em;
      text-transform: uppercase;
      font-size: 0.68rem;
    }

    /* ─── Main column ───────────────────────────────────────── */
    main {
      max-width: 1400px;
      margin: 0 auto;
      padding: 1.6rem 2rem 4rem;
    }

    .section-divider {
      font-family: var(--serif);
      font-style: italic;
      font-size: 1.4rem;
      font-weight: 500;
      color: var(--ink);
      border-bottom: 1px solid var(--rule-soft);
      padding-bottom: 0.4rem;
      margin: 2rem 0 1rem;
      font-variation-settings: "opsz" 144;
    }

    .section-divider .count {
      font-family: var(--mono);
      font-style: normal;
      font-size: 0.78rem;
      color: var(--ink-faint);
      margin-left: 0.6rem;
      font-weight: 400;
    }

    /* ─── Item card ─────────────────────────────────────────── */
    .item-grid {
      display: grid;
      gap: 1rem;
    }

    .item {
      display: grid;
      grid-template-columns: 130px 1fr auto;
      gap: 1rem;
      padding: 1rem;
      background: var(--paper-card);
      border: 1px solid var(--rule-faint);
      border-radius: 3px;
      transition: border-color 0.15s, box-shadow 0.15s;
      position: relative;
    }

    .item:hover {
      border-color: var(--rule-soft);
      box-shadow: 0 2px 8px rgba(26, 22, 19, 0.05);
    }

    .item.starred {
      border-left: 3px solid var(--gold);
      background: linear-gradient(to right, rgba(176, 137, 71, 0.04) 0%, var(--paper-card) 30%);
    }

    .item.archived {
      opacity: 0.45;
    }

    .item.archived:hover {
      opacity: 1;
    }

    .item-thumb {
      width: 130px;
      height: 90px;
      object-fit: cover;
      border-radius: 2px;
      background: var(--paper-warm);
      display: block;
    }

    .item-thumb-placeholder {
      width: 130px;
      height: 90px;
      background: var(--paper-warm);
      border-radius: 2px;
      display: flex;
      align-items: center;
      justify-content: center;
      font-family: var(--mono);
      font-size: 0.65rem;
      color: var(--ink-faint);
      letter-spacing: 0.08em;
    }

    .item-body {
      min-width: 0;
    }

    .item-source {
      font-family: var(--sans);
      font-size: 0.66rem;
      font-weight: 600;
      letter-spacing: 0.1em;
      text-transform: uppercase;
      color: var(--accent);
      margin-bottom: 0.3rem;
    }

    .item-source .group-tag {
      font-family: var(--mono);
      font-size: 0.62rem;
      color: var(--ink-faint);
      margin-left: 0.4rem;
      font-weight: 400;
      letter-spacing: 0.08em;
    }

    .item-title {
      font-family: var(--serif);
      font-size: 1.15rem;
      font-weight: 500;
      line-height: 1.25;
      letter-spacing: -0.01em;
      margin-bottom: 0.4rem;
      font-variation-settings: "opsz" 32;
    }

    .item-title a {
      color: var(--ink);
      text-decoration: none;
    }

    .item-title a:hover {
      color: var(--accent);
    }

    .item-excerpt {
      font-family: var(--serif);
      font-size: 0.92rem;
      color: var(--ink-soft);
      line-height: 1.45;
      margin-bottom: 0.5rem;
      font-variation-settings: "opsz" 14;
      /* clamp to 3 lines */
      display: -webkit-box;
      -webkit-line-clamp: 3;
      -webkit-box-orient: vertical;
      overflow: hidden;
    }

    .item-meta {
      font-family: var(--sans);
      font-size: 0.74rem;
      color: var(--ink-faint);
    }

    .item-meta .author {
      color: var(--ink-soft);
      font-weight: 500;
    }

    .item-meta .dot {
      opacity: 0.4;
      margin: 0 0.4rem;
    }

    .item-meta .date {
      font-variant-numeric: tabular-nums;
    }

    /* Editorial brief inside an item card (only shown when starred) */
    .item-brief {
      margin-top: 0.6rem;
      padding-top: 0.6rem;
      border-top: 1px dotted var(--rule-faint);
    }

    .item-brief-label {
      font-family: var(--sans);
      font-size: 0.62rem;
      font-weight: 600;
      letter-spacing: 0.08em;
      text-transform: uppercase;
      color: var(--gold);
      margin-bottom: 0.3rem;
      display: flex;
      align-items: center;
      gap: 0.5rem;
    }

    .item-brief-label .hint {
      font-weight: 400;
      letter-spacing: 0.04em;
      text-transform: none;
      color: var(--ink-faint);
      font-style: italic;
    }

    .item-brief textarea {
      width: 100%;
      font-family: var(--serif);
      font-size: 0.88rem;
      padding: 0.45rem 0.6rem;
      border: 1px solid var(--rule-soft);
      background: var(--paper);
      color: var(--ink);
      border-radius: 2px;
      resize: vertical;
      min-height: 60px;
      line-height: 1.45;
      font-variation-settings: "opsz" 14;
    }

    .item-brief textarea:focus {
      outline: none;
      border-color: var(--gold);
      box-shadow: 0 0 0 1px var(--gold);
    }

    .item-brief textarea::placeholder {
      color: var(--ink-faint);
      font-style: italic;
    }

    /* ─── Item controls ─────────────────────────────────────── */
    .item-controls {
      display: flex;
      flex-direction: column;
      align-items: stretch;
      gap: 0.4rem;
      min-width: 200px;
    }

    /* Tag editor */
    .tag-editor {
      display: flex;
      flex-wrap: wrap;
      gap: 0.25rem;
      padding: 0.35rem 0.4rem;
      border: 1px solid var(--rule-soft);
      background: var(--paper-card);
      border-radius: 2px;
      min-height: 2.1rem;
      align-items: center;
      cursor: text;
      position: relative;
    }

    .tag-editor:focus-within {
      border-color: var(--ink);
      box-shadow: 0 0 0 1px var(--ink);
    }

    .tag-editor.has-tags {
      background: linear-gradient(to right, rgba(45, 90, 61, 0.04) 0%, var(--paper-card) 100%);
    }

    .tag-chip {
      display: inline-flex;
      align-items: center;
      gap: 0.3rem;
      font-family: var(--sans);
      font-size: 0.7rem;
      font-weight: 500;
      padding: 0.18rem 0.5rem;
      background: var(--green-soft);
      color: var(--green);
      border-radius: 10px;
      border: 1px solid transparent;
      white-space: nowrap;
    }

    .tag-chip .x {
      cursor: pointer;
      opacity: 0.55;
      font-size: 0.85rem;
      line-height: 1;
      margin-left: 0.1rem;
      user-select: none;
    }

    .tag-chip .x:hover {
      opacity: 1;
      color: var(--accent);
    }

    .tag-input {
      flex: 1;
      min-width: 80px;
      font-family: var(--sans);
      font-size: 0.74rem;
      border: none;
      background: transparent;
      color: var(--ink);
      outline: none;
      padding: 0.15rem 0.2rem;
    }

    .tag-input::placeholder {
      color: var(--ink-faint);
      font-style: italic;
    }

    /* Autocomplete dropdown */
    .tag-suggestions {
      position: absolute;
      top: 100%;
      left: 0;
      right: 0;
      z-index: 5;
      background: var(--paper-card);
      border: 1px solid var(--ink);
      border-top: none;
      border-radius: 0 0 2px 2px;
      max-height: 180px;
      overflow-y: auto;
      box-shadow: 0 4px 12px rgba(26, 22, 19, 0.12);
    }

    .tag-suggestion {
      font-family: var(--sans);
      font-size: 0.74rem;
      padding: 0.35rem 0.55rem;
      cursor: pointer;
      color: var(--ink);
      border-bottom: 1px solid var(--rule-faint);
      display: flex;
      justify-content: space-between;
      align-items: center;
    }

    .tag-suggestion:last-child {
      border-bottom: none;
    }

    .tag-suggestion:hover,
    .tag-suggestion.active {
      background: var(--paper-warm);
    }

    .tag-suggestion .freq {
      font-family: var(--mono);
      font-size: 0.65rem;
      color: var(--ink-faint);
    }

    .tag-suggestion.create-new {
      font-style: italic;
      color: var(--accent);
    }

    .btn-row {
      display: flex;
      gap: 0.3rem;
    }

    .icon-btn {
      flex: 1;
      font-family: var(--sans);
      font-size: 0.7rem;
      font-weight: 600;
      letter-spacing: 0.04em;
      text-transform: uppercase;
      padding: 0.35rem 0.4rem;
      border: 1px solid var(--rule-soft);
      background: var(--paper-card);
      color: var(--ink-soft);
      border-radius: 2px;
      cursor: pointer;
      transition: all 0.12s;
    }

    .icon-btn:hover {
      border-color: var(--ink);
      color: var(--ink);
    }

    .icon-btn.active.star {
      background: var(--gold-soft);
      border-color: var(--gold);
      color: var(--accent-dk);
    }

    .icon-btn.active.archive {
      background: var(--slate-soft);
      border-color: var(--slate);
      color: var(--slate);
    }

    /* ─── Loading / empty states ────────────────────────────── */
    .feed-status {
      font-family: var(--mono);
      font-size: 0.74rem;
      color: var(--ink-faint);
      padding: 1rem;
      text-align: center;
      background: var(--paper-warm);
      border-radius: 2px;
      margin-bottom: 1rem;
    }

    .feed-status.error {
      color: var(--accent);
      background: rgba(122, 31, 43, 0.06);
    }

    .feed-error-list {
      font-family: var(--mono);
      font-size: 0.72rem;
      color: var(--accent);
      background: rgba(122, 31, 43, 0.05);
      padding: 0.7rem 1rem;
      border-left: 3px solid var(--accent);
      margin-bottom: 1rem;
      border-radius: 2px;
    }

    .feed-error-list .err-head {
      font-weight: 600;
      margin-bottom: 0.4rem;
      color: var(--accent-dk);
      letter-spacing: 0.04em;
      font-size: 0.72rem;
      text-transform: uppercase;
    }

    .feed-error-list ul {
      list-style: none;
    }

    .feed-error-list li {
      padding: 0.35rem 0;
      border-bottom: 1px dotted rgba(122, 31, 43, 0.2);
    }

    .feed-error-list li:last-child {
      border-bottom: none;
    }

    .feed-error-list .err-name {
      color: var(--accent-dk);
      font-weight: 600;
    }

    .feed-error-list .err-msg {
      color: var(--accent);
    }

    .feed-error-list .err-url {
      font-size: 0.66rem;
      color: var(--ink-faint);
      word-break: break-all;
    }

    .feed-error-list details {
      margin-top: 0.2rem;
    }

    .feed-error-list summary {
      cursor: pointer;
      color: var(--ink-soft);
      font-size: 0.66rem;
      letter-spacing: 0.06em;
      text-transform: uppercase;
      font-weight: 600;
      padding: 0.15rem 0;
      user-select: none;
    }

    .feed-error-list summary:hover {
      color: var(--ink);
    }

    .feed-error-list .err-detail {
      background: var(--paper-card);
      border: 1px solid var(--rule-faint);
      padding: 0.55rem 0.7rem;
      margin-top: 0.3rem;
      border-radius: 2px;
      color: var(--ink-soft);
      font-size: 0.7rem;
      line-height: 1.5;
    }

    .feed-error-list .err-snippet {
      background: var(--paper);
      border-left: 2px solid var(--rule-soft);
      padding: 0.35rem 0.55rem;
      margin-top: 0.3rem;
      font-size: 0.66rem;
      color: var(--ink-faint);
      word-break: break-word;
      white-space: pre-wrap;
    }

    .empty {
      font-family: var(--serif);
      font-style: italic;
      color: var(--ink-faint);
      padding: 3rem 1rem;
      text-align: center;
      font-size: 1rem;
      font-variation-settings: "opsz" 32;
    }

    /* ─── Picks view ────────────────────────────────────────── */
    .tag-cloud-wrap {
      background: var(--paper-card);
      border: 1px solid var(--rule-faint);
      border-radius: 3px;
      padding: 1rem 1.2rem;
      margin-bottom: 1.5rem;
    }

    /* Collapsible cloud panel for main tabs */
    .cloud-panel {
      background: var(--paper-card);
      border: 1px solid var(--rule-faint);
      border-radius: 3px;
      margin-bottom: 1.2rem;
      overflow: hidden;
    }

    .cloud-panel-toggle {
      display: flex;
      align-items: center;
      justify-content: space-between;
      width: 100%;
      padding: 0.65rem 1rem;
      background: var(--paper-warm);
      border: none;
      cursor: pointer;
      font-family: var(--sans);
      font-size: 0.74rem;
      font-weight: 600;
      letter-spacing: 0.08em;
      text-transform: uppercase;
      color: var(--ink-soft);
      text-align: left;
    }

    .cloud-panel-toggle:hover {
      color: var(--ink);
    }

    .cloud-panel-toggle .chevron {
      font-family: var(--mono);
      font-size: 0.85rem;
      color: var(--ink-faint);
      transition: transform 0.15s;
    }

    .cloud-panel.collapsed .chevron {
      transform: rotate(-90deg);
    }

    .cloud-panel-toggle .summary {
      font-family: var(--mono);
      font-size: 0.7rem;
      font-weight: 400;
      color: var(--ink-faint);
      letter-spacing: 0.04em;
      text-transform: none;
      margin-left: 0.6rem;
    }

    .cloud-panel-body {
      padding: 0.9rem 1.2rem 1rem;
      border-top: 1px solid var(--rule-faint);
    }

    .cloud-panel.collapsed .cloud-panel-body {
      display: none;
    }

    .cloud-panel-controls {
      display: flex;
      align-items: center;
      justify-content: space-between;
      margin-bottom: 0.6rem;
      gap: 1rem;
      flex-wrap: wrap;
    }

    .cloud-toggle-group {
      display: inline-flex;
      border: 1px solid var(--rule-soft);
      border-radius: 2px;
      overflow: hidden;
    }

    .cloud-toggle-group button {
      font-family: var(--sans);
      font-size: 0.68rem;
      font-weight: 600;
      letter-spacing: 0.06em;
      text-transform: uppercase;
      background: var(--paper-card);
      color: var(--ink-faint);
      border: none;
      padding: 0.32rem 0.65rem;
      cursor: pointer;
      border-right: 1px solid var(--rule-soft);
    }

    .cloud-toggle-group button:last-child {
      border-right: none;
    }

    .cloud-toggle-group button:hover {
      color: var(--ink);
    }

    .cloud-toggle-group button.active {
      background: var(--ink);
      color: var(--paper);
    }

    .cloud-clear {
      font-family: var(--sans);
      font-size: 0.7rem;
      color: var(--accent);
      background: none;
      border: none;
      cursor: pointer;
      text-transform: uppercase;
      letter-spacing: 0.05em;
      font-weight: 600;
    }

    .cloud-clear:hover {
      text-decoration: underline;
    }

    .tag-cloud-head {
      font-family: var(--sans);
      font-size: 0.72rem;
      font-weight: 600;
      letter-spacing: 0.1em;
      text-transform: uppercase;
      color: var(--ink-faint);
      margin-bottom: 0.6rem;
      display: flex;
      justify-content: space-between;
      align-items: baseline;
    }

    .tag-cloud-head .clear-filter {
      font-family: var(--sans);
      font-size: 0.7rem;
      color: var(--accent);
      background: none;
      border: none;
      cursor: pointer;
      text-transform: uppercase;
      letter-spacing: 0.05em;
      font-weight: 600;
    }

    .tag-cloud-head .clear-filter:hover {
      text-decoration: underline;
    }

    .tag-cloud {
      display: flex;
      flex-wrap: wrap;
      gap: 0.4rem 0.5rem;
      align-items: center;
    }

    .cloud-tag {
      font-family: var(--sans);
      font-weight: 500;
      padding: 0.25rem 0.7rem;
      background: var(--paper-warm);
      color: var(--ink);
      border-radius: 14px;
      cursor: pointer;
      border: 1px solid transparent;
      transition: all 0.12s;
      user-select: none;
    }

    .cloud-tag:hover {
      background: var(--gold-soft);
      border-color: var(--gold);
    }

    .cloud-tag.active {
      background: var(--accent);
      color: var(--paper);
      border-color: var(--accent);
    }

    .cloud-tag .freq {
      font-family: var(--mono);
      font-size: 0.7em;
      opacity: 0.6;
      margin-left: 0.3em;
      font-weight: 400;
    }

    .picks-list-head {
      font-family: var(--sans);
      font-size: 0.78rem;
      font-weight: 700;
      letter-spacing: 0.1em;
      text-transform: uppercase;
      color: var(--ink);
      background: var(--paper-warm);
      padding: 0.6rem 1rem;
      border-left: 4px solid var(--accent);
      margin-bottom: 0.6rem;
    }

    .picks-list-head .meta {
      font-family: var(--mono);
      font-size: 0.7rem;
      color: var(--ink-faint);
      font-weight: 400;
      margin-left: 0.6rem;
      letter-spacing: 0.04em;
    }

    /* Filter bar tag chips */
    .filter-tags {
      display: flex;
      flex-wrap: wrap;
      gap: 0.3rem;
      align-items: center;
    }

    .filter-tag-chip {
      display: inline-flex;
      align-items: center;
      gap: 0.3rem;
      font-family: var(--sans);
      font-size: 0.7rem;
      font-weight: 600;
      padding: 0.2rem 0.55rem;
      background: var(--accent);
      color: var(--paper);
      border-radius: 10px;
      cursor: pointer;
    }

    .filter-tag-chip .x {
      opacity: 0.7;
    }

    .filter-tag-chip:hover .x {
      opacity: 1;
    }

    /* ─── Settings page ─────────────────────────────────────── */
    .settings {
      max-width: 800px;
      margin: 0 auto;
    }

    .settings h2 {
      font-family: var(--serif);
      font-size: 1.6rem;
      font-weight: 600;
      letter-spacing: -0.01em;
      margin: 1.2rem 0 0.6rem;
      font-variation-settings: "opsz" 144;
    }

    .settings p {
      color: var(--ink-soft);
      margin-bottom: 0.8rem;
    }

    .feed-list {
      font-family: var(--mono);
      font-size: 0.78rem;
      background: var(--paper-card);
      border: 1px solid var(--rule-faint);
      padding: 0.8rem 1rem;
      border-radius: 2px;
      margin-bottom: 1rem;
    }

    .feed-list .feed-row {
      display: flex;
      justify-content: space-between;
      align-items: flex-start;
      gap: 0.8rem;
      padding: 0.4rem 0;
      border-bottom: 1px dotted var(--rule-faint);
    }

    .feed-list .feed-row:last-child {
      border-bottom: none;
    }

    .feed-list .feed-name {
      color: var(--ink);
      font-weight: 500;
      flex: 1;
      min-width: 0;
      word-break: break-word;
    }

    .feed-list .feed-url {
      color: var(--ink-faint);
      font-size: 0.72rem;
    }

    .feed-list .feed-author {
      color: var(--ink-soft);
      font-size: 0.74rem;
      flex: 0 0 auto;
    }

    .feed-list .feed-remove {
      font-family: var(--sans);
      font-size: 0.66rem;
      font-weight: 600;
      letter-spacing: 0.06em;
      text-transform: uppercase;
      background: var(--paper-card);
      color: var(--ink-faint);
      border: 1px solid var(--rule-soft);
      padding: 0.25rem 0.55rem;
      cursor: pointer;
      border-radius: 2px;
      flex: 0 0 auto;
    }

    .feed-list .feed-remove:hover {
      border-color: var(--accent);
      color: var(--accent);
      background: rgba(122, 31, 43, 0.05);
    }

    .feed-list .feed-actions {
      display: flex;
      gap: 0.3rem;
      flex: 0 0 auto;
    }

    .feed-list .feed-edit {
      font-family: var(--sans);
      font-size: 0.66rem;
      font-weight: 600;
      letter-spacing: 0.06em;
      text-transform: uppercase;
      background: var(--paper-card);
      color: var(--ink-faint);
      border: 1px solid var(--rule-soft);
      padding: 0.25rem 0.55rem;
      cursor: pointer;
      border-radius: 2px;
    }

    .feed-list .feed-edit:hover {
      border-color: var(--ink);
      color: var(--ink);
      background: var(--paper-warm);
    }

    .feed-list .feed-row.editing {
      display: block;
      padding: 0.7rem 0.4rem;
      background: var(--paper-warm);
      border-radius: 2px;
      margin: 0.2rem -0.4rem;
      border-bottom: 1px dotted var(--rule-faint);
    }

    .feed-edit-form {
      display: grid;
      grid-template-columns: 1fr 1fr;
      gap: 0.45rem;
      font-family: var(--sans);
    }

    .feed-edit-form .row-full {
      grid-column: 1 / -1;
    }

    .feed-edit-form label {
      display: block;
      font-size: 0.62rem;
      font-weight: 600;
      letter-spacing: 0.08em;
      text-transform: uppercase;
      color: var(--ink-faint);
      margin-bottom: 0.15rem;
    }

    .feed-edit-form input {
      width: 100%;
      font-family: var(--sans);
      font-size: 0.78rem;
      padding: 0.35rem 0.5rem;
      border: 1px solid var(--rule-soft);
      background: var(--paper-card);
      color: var(--ink);
      border-radius: 2px;
    }

    .feed-edit-form input:focus {
      outline: none;
      border-color: var(--ink);
      box-shadow: 0 0 0 1px var(--ink);
    }

    .feed-edit-form .feed-edit-buttons {
      grid-column: 1 / -1;
      display: flex;
      gap: 0.4rem;
      align-items: center;
      margin-top: 0.2rem;
    }

    .feed-edit-save {
      font-family: var(--sans);
      font-size: 0.7rem;
      font-weight: 600;
      letter-spacing: 0.05em;
      text-transform: uppercase;
      background: var(--ink);
      color: var(--paper);
      border: none;
      padding: 0.4rem 0.85rem;
      cursor: pointer;
      border-radius: 2px;
    }

    .feed-edit-save:hover {
      background: var(--accent);
    }

    .feed-edit-cancel {
      font-family: var(--sans);
      font-size: 0.7rem;
      font-weight: 600;
      letter-spacing: 0.05em;
      text-transform: uppercase;
      background: var(--paper-card);
      color: var(--ink-faint);
      border: 1px solid var(--rule-soft);
      padding: 0.4rem 0.85rem;
      cursor: pointer;
      border-radius: 2px;
    }

    .feed-edit-cancel:hover {
      color: var(--ink);
      border-color: var(--ink);
    }

    .feed-edit-msg {
      font-family: var(--mono);
      font-size: 0.7rem;
      color: var(--accent);
    }

    /* Add-feed form */
    .add-feed {
      background: var(--paper-warm);
      border: 1px dashed var(--rule-soft);
      border-radius: 2px;
      padding: 0.9rem 1rem;
      margin-bottom: 1rem;
      display: grid;
      grid-template-columns: 1fr 1fr;
      gap: 0.5rem;
    }

    .add-feed .row-full {
      grid-column: 1 / -1;
    }

    .add-feed label {
      display: block;
      font-family: var(--sans);
      font-size: 0.66rem;
      font-weight: 600;
      letter-spacing: 0.08em;
      text-transform: uppercase;
      color: var(--ink-faint);
      margin-bottom: 0.2rem;
    }

    .add-feed input {
      width: 100%;
      font-family: var(--sans);
      font-size: 0.82rem;
      padding: 0.4rem 0.55rem;
      border: 1px solid var(--rule-soft);
      background: var(--paper-card);
      color: var(--ink);
      border-radius: 2px;
    }

    .add-feed input:focus {
      outline: none;
      border-color: var(--ink);
      box-shadow: 0 0 0 1px var(--ink);
    }

    .add-feed .add-feed-actions {
      display: flex;
      align-items: center;
      gap: 0.6rem;
    }

    .add-feed-btn {
      font-family: var(--sans);
      font-size: 0.74rem;
      font-weight: 600;
      letter-spacing: 0.05em;
      text-transform: uppercase;
      background: var(--ink);
      color: var(--paper);
      border: none;
      padding: 0.5rem 1rem;
      cursor: pointer;
      border-radius: 2px;
    }

    .add-feed-btn:hover {
      background: var(--accent);
    }

    .add-feed-btn:disabled {
      opacity: 0.5;
      cursor: not-allowed;
    }

    .add-feed-msg {
      font-family: var(--mono);
      font-size: 0.72rem;
      color: var(--ink-faint);
    }

    .add-feed-msg.error {
      color: var(--accent);
    }

    .add-feed-msg.ok {
      color: var(--green);
    }

    .danger-btn {
      font-family: var(--sans);
      font-size: 0.78rem;
      font-weight: 600;
      letter-spacing: 0.05em;
      text-transform: uppercase;
      background: var(--paper-card);
      color: var(--accent);
      border: 1px solid var(--accent);
      padding: 0.5rem 1rem;
      cursor: pointer;
      border-radius: 2px;
    }

    .danger-btn:hover {
      background: var(--accent);
      color: var(--paper);
    }

    /* ─── Front Page builder ────────────────────────────────── */
    .fp-wrap {
      max-width: 1200px;
      margin: 0 auto;
    }

    .fp-intro {
      font-family: var(--serif);
      font-size: 1rem;
      color: var(--ink-soft);
      line-height: 1.55;
      margin-bottom: 1.5rem;
      font-variation-settings: "opsz" 14;
    }

    .fp-section {
      margin-bottom: 2rem;
    }

    .fp-section h2 {
      font-family: var(--serif);
      font-size: 1.5rem;
      font-weight: 600;
      letter-spacing: -0.01em;
      color: var(--ink);
      margin-bottom: 0.4rem;
      font-variation-settings: "opsz" 144;
    }

    .fp-section h2 em {
      font-style: italic;
      font-weight: 400;
      color: var(--accent);
    }

    .fp-section p.help {
      font-family: var(--sans);
      font-size: 0.82rem;
      color: var(--ink-faint);
      margin-bottom: 0.8rem;
    }

    .fp-tagline-input {
      width: 100%;
      font-family: var(--serif);
      font-size: 1.05rem;
      padding: 0.7rem 0.9rem;
      border: 1px solid var(--rule-soft);
      background: var(--paper-card);
      color: var(--ink);
      border-radius: 2px;
      font-variation-settings: "opsz" 14;
    }

    .fp-tagline-input:focus {
      outline: none;
      border-color: var(--ink);
      box-shadow: 0 0 0 1px var(--ink);
    }

    /* Slot grid: hero on left, selected (3) stacked on right */
    .fp-hero-area {
      display: grid;
      grid-template-columns: 2fr 1fr;
      gap: 1.2rem;
      margin-bottom: 1.5rem;
    }

    .fp-selected-area {
      display: grid;
      grid-template-columns: repeat(3, 1fr);
      gap: 1rem;
      margin-bottom: 1.5rem;
    }
    @media (min-width: 721px) {
      .fp-selected-area { grid-template-columns: repeat(3, 1fr); } /* 6 items => 2 rows of 3 */
    }

    .fp-slot {
      background: var(--paper-card);
      border: 1px dashed var(--rule-soft);
      border-radius: 3px;
      padding: 0.9rem 1rem;
      display: flex;
      flex-direction: column;
      gap: 0.5rem;
      min-height: 180px;
      position: relative;
    }

    .fp-slot.filled {
      border-style: solid;
      border-color: var(--rule-soft);
    }

    .fp-slot.hero {
      min-height: 280px;
    }

    .fp-slot-label {
      font-family: var(--sans);
      font-size: 0.66rem;
      font-weight: 600;
      letter-spacing: 0.12em;
      text-transform: uppercase;
      color: var(--accent);
      margin-bottom: 0.2rem;
    }

    .fp-slot-empty {
      color: var(--ink-faint);
      font-style: italic;
      font-family: var(--serif);
      font-size: 0.95rem;
      flex: 1;
      display: flex;
      align-items: center;
      justify-content: center;
      text-align: center;
      font-variation-settings: "opsz" 14;
    }

    .fp-slot-empty button {
      font-family: var(--sans);
      font-size: 0.74rem;
      font-weight: 600;
      letter-spacing: 0.06em;
      text-transform: uppercase;
      background: var(--ink);
      color: var(--paper);
      border: none;
      padding: 0.5rem 1rem;
      cursor: pointer;
      border-radius: 2px;
      font-style: normal;
    }

    .fp-slot-empty button:hover {
      background: var(--accent);
    }

    .fp-slot-content {
      flex: 1;
      display: flex;
      flex-direction: column;
      gap: 0.5rem;
      min-height: 0;
    }

    .fp-slot-thumb {
      width: 100%;
      aspect-ratio: 16/9;
      object-fit: cover;
      border-radius: 2px;
      background: var(--paper-warm);
    }

    .fp-slot-noimg {
      width: 100%;
      aspect-ratio: 16/9;
      background: var(--paper-warm);
      border: 1px dotted var(--rule-soft);
      display: flex;
      align-items: center;
      justify-content: center;
      font-family: var(--mono);
      font-size: 0.7rem;
      color: var(--ink-faint);
      letter-spacing: 0.08em;
      border-radius: 2px;
    }

    .fp-slot-kicker-row {
      display: flex;
      gap: 0.5rem;
      align-items: center;
    }

    .fp-slot-kicker {
      flex: 1;
      font-family: var(--sans);
      font-size: 0.7rem;
      font-weight: 600;
      letter-spacing: 0.08em;
      text-transform: uppercase;
      padding: 0.3rem 0.5rem;
      border: 1px solid var(--rule-soft);
      background: var(--paper-card);
      color: var(--accent);
      border-radius: 2px;
    }

    .fp-slot-kicker:focus {
      outline: none;
      border-color: var(--ink);
      box-shadow: 0 0 0 1px var(--ink);
    }

    .fp-slot-title {
      font-family: var(--serif);
      font-size: 1.1rem;
      font-weight: 500;
      line-height: 1.25;
      letter-spacing: -0.01em;
      color: var(--ink);
      font-variation-settings: "opsz" 32;
    }

    .fp-slot.hero .fp-slot-title {
      font-size: 1.5rem;
    }

    .fp-slot-title a {
      color: var(--ink);
      text-decoration: none;
    }

    .fp-slot-title a:hover {
      color: var(--accent);
    }

    .fp-slot-meta {
      font-family: var(--sans);
      font-size: 0.74rem;
      color: var(--ink-faint);
    }

    .fp-slot-meta .author {
      color: var(--ink-soft);
      font-weight: 500;
    }

    .fp-slot-actions {
      display: flex;
      gap: 0.4rem;
      margin-top: auto;
    }

    .fp-slot-action {
      font-family: var(--sans);
      font-size: 0.66rem;
      font-weight: 600;
      letter-spacing: 0.06em;
      text-transform: uppercase;
      background: var(--paper-card);
      color: var(--ink-faint);
      border: 1px solid var(--rule-soft);
      padding: 0.3rem 0.55rem;
      cursor: pointer;
      border-radius: 2px;
    }

    .fp-slot-action:hover {
      color: var(--ink);
      border-color: var(--ink);
    }

    .fp-slot-action.danger:hover {
      color: var(--accent);
      border-color: var(--accent);
    }

    /* Editorial brief textarea inside slot */
    .fp-slot-brief-label {
      font-family: var(--sans);
      font-size: 0.62rem;
      font-weight: 600;
      letter-spacing: 0.08em;
      text-transform: uppercase;
      color: var(--ink-faint);
      margin-top: 0.3rem;
    }

    .fp-slot-brief {
      width: 100%;
      font-family: var(--serif);
      font-size: 0.88rem;
      padding: 0.5rem 0.6rem;
      border: 1px solid var(--rule-soft);
      background: var(--paper-card);
      color: var(--ink);
      border-radius: 2px;
      resize: vertical;
      min-height: 80px;
      line-height: 1.45;
      font-variation-settings: "opsz" 14;
    }

    .fp-slot-brief:focus {
      outline: none;
      border-color: var(--ink);
      box-shadow: 0 0 0 1px var(--ink);
    }

    .fp-slot-brief::placeholder {
      color: var(--ink-faint);
      font-style: italic;
    }

    /* Recent posts auto-list preview */
    .fp-recent-list {
      background: var(--paper-card);
      border: 1px solid var(--rule-soft);
      border-radius: 3px;
      padding: 0.8rem 1rem;
    }

    .fp-recent-item {
      display: flex;
      gap: 0.6rem;
      padding: 0.45rem 0;
      border-bottom: 1px dotted var(--rule-faint);
      align-items: baseline;
    }

    .fp-recent-item:last-child {
      border-bottom: none;
    }

    .fp-recent-item .num {
      font-family: var(--serif);
      font-style: italic;
      font-size: 0.95rem;
      color: var(--accent);
      font-variation-settings: "opsz" 14;
      width: 1.2rem;
      flex: 0 0 auto;
    }

    .fp-recent-item .body {
      flex: 1;
      min-width: 0;
    }

    .fp-recent-item .title {
      font-family: var(--serif);
      font-size: 0.95rem;
      color: var(--ink);
      font-variation-settings: "opsz" 14;
      line-height: 1.3;
    }

    .fp-recent-item .meta {
      font-family: var(--sans);
      font-size: 0.72rem;
      color: var(--ink-faint);
      margin-top: 0.15rem;
    }

    /* Picker modal */
    .fp-modal-backdrop {
      position: fixed;
      inset: 0;
      background: rgba(26, 22, 19, 0.5);
      z-index: 200;
      display: flex;
      align-items: center;
      justify-content: center;
      padding: 2rem;
    }

    .fp-modal {
      background: var(--paper);
      border: 1px solid var(--ink);
      border-radius: 4px;
      max-width: 800px;
      width: 100%;
      max-height: 90vh;
      display: flex;
      flex-direction: column;
      box-shadow: 0 12px 40px rgba(26, 22, 19, 0.3);
    }

    .fp-modal-head {
      padding: 1rem 1.4rem;
      border-bottom: 1px solid var(--rule-soft);
      display: flex;
      justify-content: space-between;
      align-items: center;
    }

    .fp-modal-head h3 {
      font-family: var(--serif);
      font-size: 1.25rem;
      font-weight: 500;
      font-variation-settings: "opsz" 144;
    }

    .fp-modal-close {
      font-family: var(--sans);
      font-size: 0.78rem;
      background: none;
      border: none;
      cursor: pointer;
      color: var(--ink-faint);
      padding: 0.3rem 0.6rem;
    }

    .fp-modal-close:hover {
      color: var(--ink);
    }

    .fp-modal-body {
      padding: 1rem 1.4rem;
      overflow-y: auto;
      flex: 1;
    }

    .fp-pick-item {
      display: grid;
      grid-template-columns: 80px 1fr auto;
      gap: 0.8rem;
      padding: 0.6rem;
      border: 1px solid var(--rule-faint);
      background: var(--paper-card);
      border-radius: 2px;
      margin-bottom: 0.5rem;
      cursor: pointer;
      transition: border-color 0.12s, background 0.12s;
    }

    .fp-pick-item:hover {
      border-color: var(--ink);
      background: var(--paper-warm);
    }

    .fp-pick-item img {
      width: 80px;
      height: 56px;
      object-fit: cover;
      border-radius: 2px;
      background: var(--paper-warm);
    }

    .fp-pick-item .noimg {
      width: 80px;
      height: 56px;
      background: var(--paper-warm);
      border-radius: 2px;
    }

    .fp-pick-item .title {
      font-family: var(--serif);
      font-size: 0.95rem;
      line-height: 1.25;
      color: var(--ink);
      font-variation-settings: "opsz" 14;
      margin-bottom: 0.2rem;
    }

    .fp-pick-item .meta {
      font-family: var(--sans);
      font-size: 0.7rem;
      color: var(--ink-faint);
    }

    .fp-pick-item .badge {
      font-family: var(--mono);
      font-size: 0.65rem;
      color: var(--accent);
      align-self: center;
      white-space: nowrap;
    }

    /* Export bar */
    .fp-export-bar {
      position: sticky;
      bottom: 0;
      background: var(--paper);
      border-top: 1px solid var(--rule);
      padding: 0.9rem 0;
      margin-top: 2rem;
      display: flex;
      gap: 0.8rem;
      align-items: center;
      justify-content: space-between;
      flex-wrap: wrap;
    }

    .fp-export-status {
      font-family: var(--mono);
      font-size: 0.74rem;
      color: var(--ink-faint);
    }

    .fp-export-actions {
      display: flex;
      gap: 0.5rem;
    }

    .fp-export-btn {
      font-family: var(--sans);
      font-size: 0.78rem;
      font-weight: 600;
      letter-spacing: 0.06em;

    /* ─── Hidden ────────────────────────────────────────────── */
